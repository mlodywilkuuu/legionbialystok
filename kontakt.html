<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Legion Białystok</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
            --black-bg: #0b0c10;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR (Identyczny jak na głównej) */
        .navbar { 
            height: 90px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; border-bottom: 4px solid var(--gold); background: var(--white); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .admin-trigger { width: 40px; height: 40px; background: transparent; cursor: pointer; z-index: 1100; }
        .nav-logo-img { height: 70px; width: auto; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; margin-left: 15px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; text-transform: uppercase; font-size: 14px; }
        .nav-links a.active { color: var(--gold); }

        /* JĘZYKI */
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .lang-dropdown { position: relative; }
        .lang-btn { background: white; border: 2px solid var(--gold); padding: 8px 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .lang-content { display: none; position: absolute; right: 0; background: white; min-width: 150px; border: 2px solid var(--gold); z-index: 1001; }
        .lang-content a { color: #333; padding: 10px; text-decoration: none; display: flex; align-items: center; gap: 8px; cursor: pointer; font-family: sans-serif; }
        .lang-dropdown:hover .lang-content { display: block; }

        /* SEKCOJA KONTAKTU */
        .contact-hero {
            height: 300px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1510051644265-934cb6af7e6a?q=80') center/cover;
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .contact-hero h1 { font-size: 3rem; text-transform: uppercase; font-style: italic; margin: 0; }

        .contact-wrapper { max-width: 1200px; margin: -60px auto 60px; padding: 0 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; position: relative; z-index: 10; }

        /* KARTA INFO */
        .info-card { background: white; padding: 50px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 6px solid var(--gold); }
        .info-item { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .info-item i { font-size: 2.5rem; color: var(--gold); min-width: 50px; }
        .info-text h3 { margin: 0; font-size: 0.9rem; color: #888; text-transform: uppercase; }
        .info-text p { margin: 5px 0 0; font-size: 1.3rem; font-weight: bold; }
        .info-text a { color: var(--dark); text-decoration: none; }
        .info-text a:hover { color: var(--gold); }

        /* FORMULARZ */
        .form-card { background: var(--dark); padding: 50px; border-radius: 10px; color: white; box-shadow: 0 15px 50px rgba(0,0,0,0.3); }
        .form-card h2 { color: var(--gold); margin-top: 0; text-transform: uppercase; font-style: italic; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; }
        .input-group input, .input-group textarea { 
            width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; font-family: sans-serif;
        }
        .input-group input:focus { border-color: var(--gold); outline: none; }
        .submit-btn { background: var(--gold); color: white; border: none; padding: 20px; width: 100%; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-family: 'Arial Black'; }
        .submit-btn:hover { background: #b08d4a; transform: translateY(-3px); }

        @media (max-width: 800px) {
            .contact-wrapper { grid-template-columns: 1fr; margin-top: 20px; }
            .contact-hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="admin-trigger" onclick="adminLogin()"></div>
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img" onclick="location.href='index.html'">
            <ul class="nav-links">
                <li><a href="index.html" id="m-home">Główna</a></li>
                <li><a href="aktualnosci.html" id="m-news">Aktualności</a></li>
                <li><a href="#" id="m-team">Drużyna</a></li>
                <li><a href="kontakt.html" class="active" id="m-cont">Kontakt</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="lang-dropdown">
                <button class="lang-btn">
                    <img src="https://flagcdn.com/w40/pl.png" width="20" id="cur-flag"> <span id="cur-txt">PL</span>
                </button>
                <div class="lang-content">
                    <a onclick="setLang('pl')"><img src="https://flagcdn.com/w40/pl.png" width="18"> POLSKI</a>
                    <a onclick="setLang('en')"><img src="https://flagcdn.com/w40/gb.png" width="18"> ENGLISH</a>
                    <a onclick="setLang('es')"><img src="https://flagcdn.com/w40/es.png" width="18"> ESPAÑOL</a>
                    <a onclick="setLang('ru')"><img src="https://flagcdn.com/w40/ru.png" width="18"> РУССКИЙ</a>
                    <a onclick="setLang('fr')"><img src="https://flagcdn.com/w40/fr.png" width="18"> FRANÇAIS</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="contact-hero">
        <h1 id="h-title">Kontakt</h1>
    </header>

    <div class="contact-wrapper">
        <div class="info-card">
            <div class="info-item">
                <i class="fas fa-envelope-open-text"></i>
                <div class="info-text">
                    <h3 id="h-mail">Napisz do nas</h3>
                    <p><a href="mailto:biuro@legionbialystok.pl">biuro@legionbialystok.pl</a></p>
                </div>
            </div>
            <div class="info-item">
                <i class="fas fa-map-marked-alt"></i>
                <div class="info-text">
                    <h3 id="h-loc">Lokalizacja</h3>
                    <p>Białystok, Podlasie</p>
                </div>
            </div>
            <div class="info-item">
                <i class="fas fa-users"></i>
                <div class="info-text">
                    <h3>Social Media</h3>
                    <p>@LegionBialystok</p>
                </div>
            </div>
        </div>

        <div class="form-card">
            <h2 id="h-form">Formularz kontaktowy</h2>
            <form action="#">
                <div class="input-group">
                    <label id="l-name">Imię i Nazwisko</label>
                    <input type="text" required>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" required>
                </div>
                <div class="input-group">
                    <label id="l-msg">Wiadomość</label>
                    <textarea rows="4" required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="b-send">Wyślij Wiadomość</button>
            </form>
        </div>
    </div>

    <script>
        let currentLang = 'pl';
        const trans = {
            pl: { title: "Kontakt", home: "Główna", news: "Aktualności", team: "Drużyna", cont: "Kontakt", hMail: "Napisz do nas", hLoc: "Lokalizacja", hForm: "Formularz kontaktowy", lName: "Imię i Nazwisko", lMsg: "Wiadomość", bSend: "Wyślij Wiadomość" },
            en: { title: "Contact", home: "Home", news: "News", team: "Team", cont: "Contact", hMail: "Email us", hLoc: "Location", hForm: "Contact form", lName: "Full Name", lMsg: "Message", bSend: "Send Message" },
            // Możesz dodać resztę języków tutaj...
        };

        function setLang(l) {
            currentLang = l;
            const flags = { pl: 'pl', en: 'gb', es: 'es', ru: 'ru', fr: 'fr' };
            document.getElementById('cur-flag').src = `https://flagcdn.com/w40/${flags[l]}.png`;
            document.getElementById('cur-txt').innerText = l.toUpperCase();
            
            const t = trans[l] || trans['pl'];
            document.getElementById('h-title').innerText = t.title;
            document.getElementById('m-home').innerText = t.home;
            document.getElementById('m-news').innerText = t.news;
            document.getElementById('m-team').innerText = t.team;
            document.getElementById('m-cont').innerText = t.cont;
            document.getElementById('h-mail').innerText = t.hMail;
            document.getElementById('h-loc').innerText = t.hLoc;
            document.getElementById('h-form').innerText = t.hForm;
            document.getElementById('l-name').innerText = t.lName;
            document.getElementById('l-msg').innerText = t.lMsg;
            document.getElementById('b-send').innerText = t.bSend;
        }

        function adminLogin() {
            const p = prompt("Hasło:");
            if(p === "admin123") {
                // Tutaj możesz dodać przekierowanie do panelu zarządzania jeśli chcesz
                alert("Zalogowano jako Administrator. Możesz zarządzać treścią ze strony głównej.");
            }
        }
    </script>
</body>
</html>
