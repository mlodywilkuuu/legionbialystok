<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności - Legion Białystok</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --light-gray: #f4f4f4;
            --dark: #1a1a1a;
        }

        body, html {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--white);
            color: var(--dark);
        }

        /* IDENTYCZNY NAVBAR */
        .navbar {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 4px solid var(--gold);
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { display: flex; align-items: center; }
        .nav-logo-link { display: block; line-height: 0; transition: transform 0.3s ease; }
        .nav-logo-link:hover { transform: scale(1.05); }
        .nav-logo-img { height: 75px; width: auto; margin-right: 15px; }

        .nav-links { list-style: none; display: flex; margin: 0; padding: 0; }
        .nav-links a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            padding: 10px 15px;
            transition: 0.2s;
        }
        .nav-links a:hover { color: var(--gold); }

        /* PRAWA STRONA NAVBARA */
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .social-link { color: var(--dark); font-size: 24px; text-decoration: none; transition: 0.3s; }
        .social-link:hover { color: var(--gold); }
        .separator { width: 1px; height: 30px; background-color: #ddd; margin: 0 5px; }

        /* JĘZYKI */
        .lang-dropdown { position: relative; }
        .lang-btn {
            background: white; border: 2px solid var(--gold); padding: 8px 12px;
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 13px;
        }
        .lang-content {
            display: none; position: absolute; right: 0; top: 100%; background: white;
            min-width: 170px; border: 2px solid var(--gold); z-index: 101; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .lang-content a {
            color: #333; padding: 12px 15px; text-decoration: none; display: flex;
            align-items: center; gap: 10px; font-size: 13px; font-family: sans-serif; font-weight: bold; cursor: pointer;
        }
        .lang-content a:hover { background: #fdf6e7; color: var(--gold); }
        .lang-dropdown:hover .lang-content { display: block; }
        .flag-img { width: 22px; height: 15px; object-fit: cover; }

        /* SEKCJA AKTUALNOŚCI */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 2.5rem;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 30px;
            border-left: 8px solid var(--gold);
            padding-left: 15px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .news-card {
            background: var(--light-gray);
            border-bottom: 4px solid transparent;
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-bottom-color: var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .news-img {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            background-size: cover;
            background-position: center;
        }

        .news-info { padding: 20px; }
        .news-date { color: var(--gold); font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; }
        .news-info h3 { margin: 0; font-size: 1.1rem; text-transform: uppercase; line-height: 1.3; }

        /* OKNO ARTYKUŁU (MODAL) */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-modal {
            position: sticky;
            top: 0;
            float: right;
            padding: 15px 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: white;
            z-index: 10;
        }

        .modal-header-img { width: 100%; height: 300px; object-fit: cover; }
        .modal-inner { padding: 30px; }
        .modal-inner h2 { color: var(--gold); text-transform: uppercase; margin-top: 0; }
        .modal-inner p { font-family: sans-serif; line-height: 1.6; color: #444; font-size: 1.1rem; }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-logo-link">
                <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="nav-logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="aktualnosci.html" id="link-news" style="color: var(--gold);">Aktualności</a></li>
                <li><a href="druzyna.html" id="link-team">Drużyna</a></li>
                <li><a href="terminarz.html" id="link-schedule">Terminarz</a></li>
                <li><a href="kontakt.html" id="link-contact">Kontakt</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <a href="https://www.instagram.com/legionbialystok/" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
            <div class="separator"></div>
            <div class="lang-dropdown">
                <button class="lang-btn">
                    <img src="https://flagcdn.com/w40/pl.png" class="flag-img" id="current-flag"> <span id="current-lang">PL</span> ▼
                </button>
                <div class="lang-content">
                    <a onclick="changeLang('pl')"><img src="https://flagcdn.com/w40/pl.png" class="flag-img"> Polski</a>
                    <a onclick="changeLang('en')"><img src="https://flagcdn.com/w40/gb.png" class="flag-img"> English</a>
                    <a onclick="changeLang('es')"><img src="https://flagcdn.com/w40/es.png" class="flag-img"> Español</a>
                    <a onclick="changeLang('ru')"><img src="https://flagcdn.com/w40/ru.png" class="flag-img"> Русский</a>
                    <a onclick="changeLang('ua')"><img src="https://flagcdn.com/w40/ua.png" class="flag-img"> Українська</a>
                    <a onclick="changeLang('by')"><img src="https://flagcdn.com/w40/by.png" class="flag-img"> Беларуская</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 id="section-title" class="section-title">Aktualności</h2>
        
        <div class="news-grid">
            <div class="news-card" onclick="openArticle('Wielkie otwarcie sezonu', 'Przygotowania do nadchodzącego sezonu dobiegły końca. Nasz zespół jest gotowy do walki o najwyższe cele. Trener zapowiada ofensywny styl gry i wiele emocji dla kibiców Legionu.', 'https://via.placeholder.com/800x400/C5A059/ffffff?text=LEGION+BIAŁYSTOK')">
                <div class="news-img" style="background-image: url('https://via.placeholder.com/400x250/C5A059/ffffff?text=ARTYKUŁ+1');"></div>
                <div class="news-info">
                    <div class="news-date">18 KWIECIEŃ 2026</div>
                    <h3>Wielkie otwarcie sezonu - sprawdź plany drużyny</h3>
                </div>
            </div>

            <div class="news-card" onclick="openArticle('Nowe wzmocnienia', 'Do klubu dołączyło dwóch nowych zawodników, którzy mają wzmocnić naszą linię pomocy. Obaj piłkarze mają doświadczenie w wyższych ligach i są gotowi na debiut.', 'https://via.placeholder.com/800x400/1a1a1a/C5A059?text=TRANSFERY')">
                <div class="news-img" style="background-image: url('https://via.placeholder.com/400x250/1a1a1a/C5A059?text=ARTYKUŁ+2');"></div>
                <div class="news-info">
                    <div class="news-date">15 KWIECIEŃ 2026</div>
                    <h3>Nowe twarze w Legionie Białystok</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeArticle()">&times;</span>
            <img id="modalImg" class="modal-header-img" src="" alt="">
            <div class="modal-inner">
                <h2 id="modalTitle"></h2>
                <p id="modalText"></p>
            </div>
        </div>
    </div>

    <script>
        function openArticle(title, text, img) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('modalImg').src = img;
            document.getElementById('articleModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeArticle() {
            document.getElementById('articleModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('articleModal')) {
                closeArticle();
            }
        }

        // Tłumaczenia (identyczne jak w index)
        const translations = {
            pl: { news: "Aktualności", team: "Drużyna", schedule: "Terminarz", contact: "Kontakt" },
            en: { news: "News", team: "Team", schedule: "Schedule", contact: "Contact" },
            es: { news: "Noticias", team: "Equipo", schedule: "Calendario", contact: "Contacto" },
            ru: { news: "Новости", team: "Команда", schedule: "Расписание", contact: "Контакты" },
            ua: { news: "Новини", team: "Команда", schedule: "Розклад", contact: "Контакти" },
            by: { news: "Навіны", team: "Каманда", schedule: "Раскlad", contact: "Кантакты" }
        };

        function changeLang(lang) {
            const t = translations[lang];
            document.getElementById('link-news').innerText = t.news;
            document.getElementById('link-team').innerText = t.team;
            document.getElementById('link-schedule').innerText = t.schedule;
            document.getElementById('link-contact').innerText = t.contact;
            document.getElementById('section-title').innerText = t.news;

            const flags = { pl: 'pl', en: 'gb', es: 'es', ru: 'ru', ua: 'ua', by: 'by' };
            document.getElementById('current-flag').src = `https://flagcdn.com/w40/${flags[lang]}.png`;
            document.getElementById('current-lang').innerText = lang.toUpperCase();
        }
    </script>

</body>
</html>
