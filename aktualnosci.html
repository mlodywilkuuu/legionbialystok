<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności - Legion Białystok</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); }

        /* NAVBAR (Identyczny jak wcześniej) */
        .navbar { height: 90px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 4px solid var(--gold); background: var(--white); position: sticky; top: 0; z-index: 1000; }
        .nav-logo-img { height: 75px; }
        .nav-links { list-style: none; display: flex; gap: 20px; text-transform: uppercase; font-size: 14px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; }

        /* GRID AKTUALNOŚCI */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        
        .news-card { background: #f4f4f4; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .news-img { width: 100%; height: 250px; background-size: cover; background-position: center; }
        .news-info { padding: 20px; }
        .news-date { color: var(--gold); font-size: 12px; margin-bottom: 10px; }

        /* OKNO ARTYKUŁU (MODAL) - Styl z obrazka */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 1000px; max-height: 90vh; background: #1a1a1a; color: white; overflow-y: auto; border-radius: 5px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 20px; font-size: 30px; color: white; cursor: pointer; z-index: 10; }
        
        .article-hero { width: 100%; height: 500px; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; }
        .article-hero::after { content: ''; position: absolute; width: 100%; height: 100%; background: linear-gradient(to top, #1a1a1a, transparent); }
        .article-header-text { position: relative; z-index: 2; padding: 40px; }
        .article-header-text h2 { font-size: 3rem; text-transform: uppercase; margin: 0; line-height: 1.1; }
        .article-body { padding: 40px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.8; color: #ccc; }

        /* PANEL ADMINA */
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.2; cursor: pointer; color: var(--gold); font-size: 12px; }
        .admin-trigger:hover { opacity: 1; }
        
        #adminPanel { display: none; background: white; color: black; padding: 30px; border-top: 5px solid var(--gold); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; }
        
        /* Styl edytora Quill */
        #editor-container { height: 300px; margin-bottom: 20px; }
        .btn-save { background: var(--gold); color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html"><img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img"></a>
            <ul class="nav-links">
                <li><a href="aktualnosci.html" style="color:var(--gold)">Aktualności</a></li>
                <li><a href="druzyna.html">Drużyna</a></li>
                <li><a href="terminarz.html">Terminarz</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="https://www.instagram.com/legionbialystok/" class="social-link"><i class="fab fa-instagram"></i></a>
            <div class="separator"></div>
            </div>
    </nav>

    <div class="container">
        <h2 style="border-left: 5px solid var(--gold); padding-left: 15px; text-transform: uppercase;">Ostatnie wiadomości</h2>
        <div class="news-grid" id="newsGrid">
            <div class="news-card" onclick="openArticle('[MATCH PREVIEW] FC DINAMO WROCŁAW - RUNNERSHOOD', 'Przed nami 4. kolejka Czwartej Ligi PRO Ligi. Na boisku przy ul. Lotniczej dojdzie do starcia drużyn...', 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1000', '2026-04-16')">
                <div class="news-img" style="background-image: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1000');"></div>
                <div class="news-info">
                    <div class="news-date">DATA PUBLIKACJI: 2026-04-16</div>
                    <h3>[MATCH PREVIEW] FC DINAMO WROCŁAW - RUNNERSHOOD</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeArticle()">&times;</span>
            <div id="artHero" class="article-hero">
                <div class="article-header-text">
                    <div id="artDate" style="color: var(--gold); font-weight: bold; margin-bottom: 10px;"></div>
                    <h2 id="artTitle"></h2>
                </div>
            </div>
            <div id="artBody" class="article-body"></div>
        </div>
    </div>

    <div class="admin-trigger" onclick="checkPass()">Panel Admina</div>
    
    <div id="adminPanel" class="modal">
        <div class="modal-content" style="background: white; color: black; padding: 30px;">
            <span class="close-btn" onclick="document.getElementById('adminPanel').style.display='none'" style="color: black;">&times;</span>
            <h2 style="color: var(--gold)">DODAJ NOWY ARTYKUŁ</h2>
            
            <div class="input-group">
                <label>Tytuł artykułu</label>
                <input type="text" id="postTitle" placeholder="Np. [MATCH PREVIEW]...">
            </div>
            
            <div class="input-group">
                <label>Link do zdjęcia (URL)</label>
                <input type="text" id="postImg" placeholder="Wklej link do zdjęcia...">
            </div>

            <label>Treść artykułu (Pełne formatowanie)</label>
            <div id="editor-container"></div>
            
            <button class="btn-save" onclick="savePost()">Opublikuj artykuł</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Inicjalizacja profesjonalnego edytora
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        function openArticle(title, body, img, date) {
            document.getElementById('artTitle').innerText = title;
            document.getElementById('artBody').innerHTML = body;
            document.getElementById('artHero').style.backgroundImage = `url('${img}')`;
            document.getElementById('artDate').innerText = `DATA PUBLIKACJI: ${date}`;
            document.getElementById('articleModal').style.display = 'flex';
        }

        function closeArticle() {
            document.getElementById('articleModal').style.display = 'none';
        }

        function checkPass() {
            let pass = prompt("Podaj hasło do panelu:");
            if(pass === "admin123") { // Tu ustaw swoje hasło
                document.getElementById('adminPanel').style.display = 'flex';
            } else {
                alert("Błędne hasło!");
            }
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const img = document.getElementById('postImg').value;
            const body = quill.root.innerHTML; // Pobiera treść z edytora
            const date = new Date().toISOString().split('T')[0];

            if(!title || !img) return alert("Uzupełnij tytuł i zdjęcie!");

            // Tworzenie nowej karty
            const grid = document.getElementById('newsGrid');
            const newCard = document.createElement('div');
            newCard.className = 'news-card';
            newCard.onclick = () => openArticle(title, body, img, date);
            newCard.innerHTML = `
                <div class="news-img" style="background-image: url('${img}');"></div>
                <div class="news-info">
                    <div class="news-date">DATA PUBLIKACJI: ${date}</div>
                    <h3>${title}</h3>
                </div>
            `;
            
            grid.prepend(newCard); // Dodaje na początku listy
            document.getElementById('adminPanel').style.display = 'none';
            alert("Artykuł dodany!");
        }
    </script>
</body>
</html>
