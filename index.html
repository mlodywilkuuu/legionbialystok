<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
            --black-bg: #0b0c10;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { 
            height: 90px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; border-bottom: 4px solid var(--gold); background: var(--white); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-logo-img { height: 70px; width: auto; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; text-transform: uppercase; font-size: 14px; }

        /* UKRYTY PRZYCISK ADMINA */
        .admin-trigger { position: absolute; left: 0; top: 0; width: 15px; height: 15px; z-index: 1100; cursor: pointer; }

        /* JĘZYKI */
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .lang-dropdown { position: relative; }
        .lang-btn { background: white; border: 2px solid var(--gold); padding: 8px 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .lang-content { display: none; position: absolute; right: 0; background: white; min-width: 150px; border: 2px solid var(--gold); z-index: 1001; }
        .lang-content a { color: #333; padding: 10px; text-decoration: none; display: flex; align-items: center; gap: 8px; cursor: pointer; font-family: sans-serif; }
        .lang-dropdown:hover .lang-content { display: block; }

        /* HERO & ARTYKUŁY (STYL ZE ZDJĘCIEM W TLE) */
        .hero { height: 50vh; background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000') center/cover; position: relative; }
        
        .news-slider-wrap { margin-top: -150px; padding: 0 50px; position: relative; z-index: 10; }
        .news-slider { display: flex; overflow-x: auto; gap: 20px; scroll-behavior: smooth; scrollbar-width: none; }
        .news-slider::-webkit-scrollbar { display: none; }

        .news-card { 
            min-width: 350px; height: 450px; background: var(--black-bg); border-radius: 10px; 
            overflow: hidden; position: relative; flex-shrink: 0; cursor: pointer; transition: 0.3s;
        }
        .news-card:hover { transform: translateY(-10px); }
        .news-card-img { width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.7; transition: 0.5s; }
        .news-card-info { position: absolute; bottom: 0; padding: 25px; color: white; width: 100%; box-sizing: border-box; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .news-card-date { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 5px; display: block; }
        .news-card-title { font-size: 1.4rem; margin: 0; text-transform: uppercase; font-style: italic; }

        /* TERMINARZ (KAFELKI POD SPODEM) */
        .matches-section { max-width: 1300px; margin: 60px auto; padding: 0 50px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .match-card { background: #f8f8f8; border-top: 4px solid var(--gold); padding: 25px; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .match-opponent { font-size: 1.2rem; font-style: italic; margin: 15px 0; display: block; }

        /* PANEL ADMINA */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; color: white; padding: 40px; }
        .admin-container { max-width: 600px; margin: 0 auto; background: #222; padding: 30px; border-radius: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #333; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-box { background: white; margin: 5vh auto; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 8px; position: relative; color: #333; }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 40px; color: white; cursor: pointer; z-index: 3100; }
    </style>
</head>
<body>

    <div class="admin-trigger" onclick="checkPassword()"></div>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img" onclick="location.href='index.html'">
            <ul class="nav-links">
                <li><a href="#" id="l-news">Aktualności</a></li>
                <li><a href="#" id="l-team">Drużyna</a></li>
                <li><a href="#" id="l-sched">Terminarz</a></li>
                <li><a href="#" id="l-cont">Kontakt</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="lang-dropdown">
                <button class="lang-btn">
                    <img src="https://flagcdn.com/w40/pl.png" width="20" id="cur-flag"> <span id="cur-txt">PL</span>
                </button>
                <div class="lang-content">
                    <a onclick="setLang('pl')"><img src="https://flagcdn.com/w40/pl.png" width="18"> POLSKI</a>
                    <a onclick="setLang('en')"><img src="https://flagcdn.com/w40/gb.png" width="18"> ENGLISH</a>
                    <a onclick="setLang('es')"><img src="https://flagcdn.com/w40/es.png" width="18"> ESPAÑOL</a>
                    <a onclick="setLang('ru')"><img src="https://flagcdn.com/w40/ru.png" width="18"> РУССКИЙ</a>
                    <a onclick="setLang('fr')"><img src="https://flagcdn.com/w40/fr.png" width="18"> FRANÇAIS</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero"></header>

    <div class="news-slider-wrap">
        <div class="news-slider" id="newsFeed"></div>
    </div>

    <section class="matches-section">
        <h2 style="font-style: italic; text-transform: uppercase;" id="l-match-title">Terminarz Meczy</h2>
        <div class="match-grid" id="matchFeed"></div>
    </section>

    <div id="newsModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-box" id="modalBody"></div>
    </div>

    <div id="adminPanel">
        <div class="admin-container">
            <h2 style="color:var(--gold)">ZARZĄDZANIE TREŚCIĄ</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn-gold" onclick="setTab('n')">NEWSY</button>
                <button class="btn-gold" onclick="setTab('m')">MECZE</button>
            </div>

            <div id="admin-news">
                <h3 id="adm-title">Dodaj Artykuł</h3>
                <input type="text" id="post-title" placeholder="Tytuł (PL)">
                <input type="text" id="post-img" placeholder="URL zdjęcia">
                <input type="datetime-local" id="post-date">
                <textarea id="post-content" rows="4" placeholder="Treść (PL)"></textarea>
                <button class="btn-gold" onclick="savePost()">ZAPISZ ARTYKUŁ</button>
            </div>

            <div id="admin-matches" style="display:none;">
                <h3>Dodaj Mecz</h3>
                <input type="text" id="m-opponent" placeholder="Przeciwnik">
                <input type="datetime-local" id="m-date">
                <input type="text" id="m-place" placeholder="Lokalizacja">
                <button class="btn-gold" onclick="saveMatch()">DODAJ MECZ</button>
            </div>
            
            <button onclick="closeAdmin()" class="btn-gold" style="background:#444">ZAMKNIJ</button>
        </div>
    </div>

    <script>
        let currentLang = 'pl';
        let posts = JSON.parse(localStorage.getItem('legion_posts')) || [];
        let matches = JSON.parse(localStorage.getItem('legion_matches')) || [];

        function render() {
            // Newsy
            const newsHtml = posts.sort((a,b) => new Date(b.date) - new Date(a.date)).map((p, idx) => `
                <div class="news-card" onclick="openNews(${idx})">
                    <div class="news-card-img" style="background-image:url('${p.img}')"></div>
                    <div class="news-card-info">
                        <span class="news-card-date">${p.date.replace('T', ' ')}</span>
                        <h3 class="news-card-title">${p.title}</h3>
                    </div>
                </div>
            `).join('');
            document.getElementById('newsFeed').innerHTML = newsHtml || '<p style="color:white">Brak newsów.</p>';

            // Mecze
            const matchHtml = matches.sort((a,b) => new Date(a.date) - new Date(b.date)).map(m => `
                <div class="match-card">
                    <span style="color:var(--gold); font-weight:bold">${m.date.replace('T', ' ')}</span>
                    <span class="match-opponent">LEGION vs ${m.opponent}</span>
                    <small style="color:#666">${m.place}</small>
                </div>
            `).join('');
            document.getElementById('matchFeed').innerHTML = matchHtml || '<p>Brak zaplanowanych meczy.</p>';
        }

        function checkPassword() {
            const pw = prompt("Podaj hasło administratora:");
            if(pw === "admin123") { // Zmień hasło tutaj
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("Błędne hasło!");
            }
        }

        function savePost() {
            const newPost = {
                title: document.getElementById('post-title').value,
                img: document.getElementById('post-img').value,
                date: document.getElementById('post-date').value,
                content: document.getElementById('post-content').value
            };
            posts.push(newPost);
            localStorage.setItem('legion_posts', JSON.stringify(posts));
            render();
            alert("Dodano artykuł!");
        }

        function saveMatch() {
            const m = {
                opponent: document.getElementById('m-opponent').value,
                date: document.getElementById('m-date').value,
                place: document.getElementById('m-place').value
            };
            matches.push(m);
            localStorage.setItem('legion_matches', JSON.stringify(matches));
            render();
            alert("Mecz dodany!");
        }

        function openNews(idx) {
            const p = posts[idx];
            document.getElementById('modalBody').innerHTML = `
                <div style="height:350px; background:url('${p.img}') center/cover"></div>
                <div style="padding:40px">
                    <span style="color:var(--gold); font-weight:bold">${p.date.replace('T', ' ')}</span>
                    <h1 style="margin:10px 0; font-style:italic">${p.title}</h1>
                    <div style="line-height:1.7; font-family:sans-serif">${p.content}</div>
                </div>
            `;
            document.getElementById('newsModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        function setTab(t) {
            document.getElementById('admin-news').style.display = t === 'n' ? 'block' : 'none';
            document.getElementById('admin-matches').style.display = t === 'm' ? 'block' : 'none';
        }

        window.onload = render;
    </script>
</body>
</html>
