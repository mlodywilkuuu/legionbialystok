<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Oficjalna Strona</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
            --black-bg: #0b0c10;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { 
            height: 90px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; border-bottom: 4px solid var(--gold); background: var(--white); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        
        /* UKRYTY PRZYCISK ADMINA */
        .admin-secret-btn {
            width: 10px; height: 10px; background: transparent; cursor: default;
            position: absolute; left: 0; top: 0; z-index: 1001;
        }
        .admin-secret-btn:hover { background: rgba(197, 160, 89, 0.1); cursor: pointer; }

        .nav-logo-img { height: 70px; width: auto; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; text-transform: uppercase; font-size: 14px; }

        /* HERO SECTION */
        .hero { height: 50vh; background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000') center/cover; }

        /* ARTYKUŁY (NOWY STYL) */
        .section-news { max-width: 1400px; margin: -100px auto 50px; padding: 0 40px; position: relative; z-index: 10; }
        .news-slider { display: flex; overflow-x: auto; gap: 25px; scroll-behavior: smooth; scrollbar-width: none; padding-bottom: 20px; }
        .news-slider::-webkit-scrollbar { display: none; }
        
        .article-card { 
            min-width: 380px; background: white; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            cursor: pointer; transition: 0.3s; overflow: hidden; border-bottom: 5px solid transparent;
        }
        .article-card:hover { transform: translateY(-10px); border-bottom-color: var(--gold); }
        .article-img { width: 100%; height: 250px; background-size: cover; background-position: center; }
        .article-info { padding: 25px; }

        /* KALENDARZ MECZÓW */
        .schedule-section { max-width: 1200px; margin: 50px auto; padding: 0 40px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .match-card { background: #f9f9f9; border-left: 5px solid var(--gold); padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .match-date { color: var(--gold); font-weight: bold; font-size: 12px; margin-bottom: 10px; display: block; }
        .match-teams { font-style: italic; text-transform: uppercase; font-size: 1.1rem; margin: 10px 0; }
        .match-info { font-family: sans-serif; font-size: 13px; color: #666; }

        /* PANEL ADMINA */
        .admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; color: white; padding: 50px; box-sizing: border-box; }
        .admin-content { max-width: 800px; margin: 0 auto; background: #222; padding: 30px; border-radius: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: none; }
        .admin-btn { background: var(--gold); color: white; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        /* MODAL ARTYKUŁU */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5vh auto; width: 90%; max-width: 800px; border-radius: 8px; overflow: hidden; position: relative; max-height: 85vh; overflow-y: auto; color: #333; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 40px; cursor: pointer; color: white; z-index: 3010; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="admin-secret-btn" onclick="toggleAdmin()"></div>
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img" onclick="location.href='index.html'">
            <ul class="nav-links">
                <li><a href="aktualnosci.html" data-key="nav_news">Aktualności</a></li>
                <li><a href="#" data-key="nav_team">Drużyna</a></li>
                <li><a href="#" data-key="nav_sched">Terminarz</a></li>
                <li><a href="#" data-key="nav_cont">Kontakt</a></li>
            </ul>
        </div>
        </nav>

    <header class="hero"></header>

    <section class="section-news">
        <div class="news-slider" id="homeNewsSlider"></div>
    </section>

    <section class="schedule-section">
        <h2 style="text-transform: uppercase; font-style: italic;" data-key="nav_sched">Terminarz</h2>
        <div class="match-grid" id="homeMatchGrid"></div>
    </section>

    <div id="artModal" class="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content" id="modalBox"></div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-content">
            <h2 style="color: var(--gold);">PANEL ADMINISTRATORA</h2>
            <button onclick="toggleAdmin()" style="float: right; background: none; color: white; border: none; cursor: pointer;">ZAMKNIJ X</button>
            
            <div id="admin-tabs">
                <button onclick="showTab('tab-news')" class="admin-btn" style="width: 48%; display: inline-block;">Zarządzaj Newsami</button>
                <button onclick="showTab('tab-matches')" class="admin-btn" style="width: 48%; display: inline-block;">Zarządzaj Meczami</button>
            </div>

            <div id="tab-news" class="admin-tab">
                <h3>Dodaj nowy artykuł</h3>
                <input type="text" id="postTitle" placeholder="Tytuł artykułu">
                <input type="datetime-local" id="postDate">
                <input type="text" id="postImage" placeholder="Link do zdjęcia">
                <textarea id="postContent" placeholder="Treść artykułu (HTML dozwolony)" rows="5"></textarea>
                <button onclick="savePost()" class="admin-btn">PUBLIKUJ ARTYKUŁ</button>
            </div>

            <div id="tab-matches" class="admin-tab" style="display:none;">
                <h3>Dodaj nowy mecz</h3>
                <input type="text" id="matchOpponent" placeholder="Przeciwnik">
                <input type="datetime-local" id="matchDate">
                <input type="text" id="matchLocation" placeholder="Lokalizacja (np. Stadion Miejski)">
                <input type="text" id="matchCompetition" placeholder="Rozgrywki (np. 4. Liga)">
                <button onclick="saveMatch()" class="admin-btn">DODAJ MECZ DO TERMINARZA</button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'pl';

        // ŁADOWANIE NEWSÓW (Zsynchronizowane z aktualnosci.html)
        function loadHomeNews() {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
            const container = document.getElementById('homeNewsSlider');
            const now = new Date();

            const published = posts.filter(p => new Date(p.date) <= now)
                                   .sort((a,b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = published.length ? published.slice(0, 6).map(p => `
                <div class="article-card" onclick="openModal('${p.id}')">
                    <div class="article-img" style="background-image: url('${p.image}')"></div>
                    <div class="article-info">
                        <span class="article-date">${formatDate(p.date)}</span>
                        <h3 class="article-title">${p.title}</h3>
                    </div>
                </div>
            `).join('') : '<p style="opacity:0.3;">Brak aktualności.</p>';
        }

        // ŁADOWANIE MECZÓW
        function loadHomeMatches() {
            const matches = JSON.parse(localStorage.getItem('dynamo_matches')) || [];
            const container = document.getElementById('homeMatchGrid');
            
            container.innerHTML = matches.sort((a,b) => new Date(a.date) - new Date(b.date)).map(m => `
                <div class="match-card">
                    <span class="match-date">${formatDate(m.date)}</span>
                    <div class="match-teams">LEGION BIAŁYSTOK vs ${m.opponent}</div>
                    <div class="match-info">${m.location} | ${m.competition}</div>
                </div>
            `).join('');
        }

        // FUNKCJE ADMINA
        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function showTab(id) {
            document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function savePost() {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts')) || [];
            const newPost = {
                id: Date.now().toString(),
                title: document.getElementById('postTitle').value,
                date: document.getElementById('postDate').value,
                image: document.getElementById('postImage').value,
                content: document.getElementById('postContent').value
            };
            posts.push(newPost);
            localStorage.setItem('dynamo_posts', JSON.stringify(posts));
            alert('Artykuł zapisany!');
            loadHomeNews();
        }

        function saveMatch() {
            const matches = JSON.parse(localStorage.getItem('dynamo_matches')) || [];
            const newMatch = {
                opponent: document.getElementById('matchOpponent').value,
                date: document.getElementById('matchDate').value,
                location: document.getElementById('matchLocation').value,
                competition: document.getElementById('matchCompetition').value
            };
            matches.push(newMatch);
            localStorage.setItem('dynamo_matches', JSON.stringify(matches));
            alert('Mecz dodany do kalendarza!');
            loadHomeMatches();
        }

        function formatDate(str) {
            const d = new Date(str);
            return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function openModal(id) {
            const posts = JSON.parse(localStorage.getItem('dynamo_posts'));
            const p = posts.find(item => item.id === id);
            const box = document.getElementById('modalBox');
            box.innerHTML = `
                <div style="height:350px; background:url('${p.image}') center/cover"></div>
                <div style="padding:40px;">
                    <span style="color:var(--gold); font-weight:bold;">${formatDate(p.date)}</span>
                    <h1 style="margin:15px 0; font-style:italic; text-transform:uppercase;">${p.title}</h1>
                    <div style="line-height:1.8; color:#444;">${p.content}</div>
                </div>
            `;
            document.getElementById('artModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('artModal').style.display = 'none'; }

        window.onload = () => { loadHomeNews(); loadHomeMatches(); };
    </script>
</body>
</html>
