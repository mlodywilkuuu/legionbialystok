<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok</title>
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--white);
            color: #333;
            overflow: hidden; /* Blokada przewijania podczas ładowania */
        }

        /* EKRAN ŁADOWANIA (PRELOADER) */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-logo {
            max-width: 200px;
            animation: pulse-gold 2s infinite ease-in-out;
        }

        /* Animacja pulsowania loga */
        @keyframes pulse-gold {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.4)); }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        .loader-bar {
            width: 150px;
            height: 3px;
            background: #eee;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        .loader-progress {
            width: 50%;
            height: 100%;
            background: var(--gold);
            position: absolute;
            animation: loading-line 1.5s infinite ease-in-out;
        }

        @keyframes loading-line {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        /* NAWIGACJA - LOGO I PRZYCISKI MAX DO LEWEJ */
        .navbar {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 4px solid var(--gold);
        }

        .nav-left { display: flex; align-items: center; }
        .nav-logo-img { height: 65px; margin-right: 15px; }

        .nav-links { list-style: none; display: flex; margin: 0; padding: 0; }
        .nav-links a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            padding: 10px 15px;
        }

        .nav-links a:hover { color: var(--gold); }

        /* JĘZYKI */
        .lang-dropdown { position: relative; margin-right: 10px; }
        .lang-btn {
            background: white;
            border: 2px solid var(--gold);
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .lang-content {
            display: none;
            position: absolute;
            right: 0;
            background: white;
            min-width: 180px;
            border: 2px solid var(--gold);
            z-index: 101;
        }

        .lang-content a {
            color: #333;
            padding: 12px 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .lang-content a:hover { background: #fdf6e7; }
        .lang-dropdown:hover .lang-content { display: block; }

        .flag-img { width: 22px; height: 15px; object-fit: cover; }

        .main-content { text-align: center; padding: 100px 20px; }
        
        .fade-out { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="loader">
        <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Legion Logo" class="loader-logo">
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="nav-logo-img">
            <ul class="nav-links">
                <li><a href="#" id="link-start">Start</a></li>
                <li><a href="#" id="link-about">O Klubie</a></li>
                <li><a href="#" id="link-team">Drużyna</a></li>
                <li><a href="#" id="link-contact">Kontakt</a></li>
            </ul>
        </div>

        <div class="lang-dropdown">
            <button class="lang-btn">
                <img src="https://flagcdn.com/w40/pl.png" class="flag-img" id="current-flag"> <span id="current-lang">PL</span> ▼
            </button>
            <div class="lang-content">
                <a onclick="changeLang('pl')"><img src="https://flagcdn.com/w40/pl.png" class="flag-img"> Polski</a>
                <a onclick="changeLang('en')"><img src="https://flagcdn.com/w40/gb.png" class="flag-img"> English</a>
                <a onclick="changeLang('es')"><img src="https://flagcdn.com/w40/es.png" class="flag-img"> Español</a>
                <a onclick="changeLang('ru')"><img src="https://flagcdn.com/w40/ru.png" class="flag-img"> Русский</a>
                <a onclick="changeLang('ua')"><img src="https://flagcdn.com/w40/ua.png" class="flag-img"> Українська</a>
                <a onclick="changeLang('by')"><img src="https://flagcdn.com/w40/by.png" class="flag-img"> Беларуская</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h2 id="main-title" style="font-size: 3.5rem; color: var(--gold);">LEGION BIAŁYSTOK</h2>
        <p id="main-desc" style="font-size: 1.5rem; font-weight: bold;">Oficjalny serwis klubu.</p>
    </div>

    <script>
        // Automatyczne wyłączenie loadera po załadowaniu strony
        window.addEventListener('load', function() {
            const loader = document.getElementById('loader');
            // Dodajemy małe opóźnienie (np. 1.5 sekundy), żeby użytkownik zdążył zobaczyć logo
            setTimeout(() => {
                loader.classList.add('fade-out');
                document.body.style.overflow = 'auto'; // Przywraca przewijanie
            }, 1500); 
        });

        // Baza tłumaczeń
        const translations = {
            pl: { start: "Start", about: "O Klubie", team: "Drużyna", contact: "Kontakt", title: "LEGION BIAŁYSTOK", desc: "Oficjalny serwis klubu." },
            en: { start: "Home", about: "About Us", team: "Team", contact: "Contact", title: "LEGION BIALYSTOK", desc: "Official club website." },
            es: { start: "Inicio", about: "Club", team: "Equipo", contact: "Contacto", title: "LEGION BIALYSTOK", desc: "Sitio oficial." },
            ru: { start: "Главная", about: "О клубе", team: "Команда", contact: "Контакт", title: "ЛЕГИОН БЕЛОСТОК", desc: "Официальный сайт." },
            ua: { start: "Головна", about: "Про клуб", team: "Команда", contact: "Контакт", title: "ЛЕГІОН БІЛОСТОК", desc: "Офіційний сайт." },
            by: { start: "Галоўная", about: "Пра клуб", team: "Каманда", contact: "Кантакт", title: "ЛЕГІЁН БЕЛАСТОК", desc: "Афіцыйны сайт." }
        };

        function changeLang(lang) {
            const t = translations[lang];
            document.getElementById('link-start').innerText = t.start;
            document.getElementById('link-about').innerText = t.about;
            document.getElementById('link-team').innerText = t.team;
            document.getElementById('link-contact').innerText = t.contact;
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('main-desc').innerText = t.desc;

            const flags = { pl: 'pl', en: 'gb', es: 'es', ru: 'ru', ua: 'ua', by: 'by' };
            document.getElementById('current-flag').src = `https://flagcdn.com/w40/${flags[lang]}.png`;
            document.getElementById('current-lang').innerText = lang.toUpperCase();
        }
    </script>

</body>
</html>
