<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok</title>
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --bg-light: #fdfdfd;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--white);
            color: #333;
            overflow: hidden;
        }

        /* PLANSZA OVERLAY - BIAŁO ZŁOTA */
        #under-construction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.8s ease;
        }

        .big-logo {
            max-width: 300px;
            filter: drop-shadow(0 10px 15px rgba(197, 160, 89, 0.2));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* PRZYCISK WEJŚCIA */
        .enter-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            background: var(--gold);
            border: none;
            color: white;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* NAWIGACJA - LOGO I PRZYCISKI MAX DO LEWEJ */
        .navbar {
            height: 80px;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between; /* To rozpycha lewą stronę i prawą */
            padding: 0 10px; /* Minimalny margines od krawędzi ekranu */
            border-bottom: 4px solid var(--gold);
        }

        .nav-left {
            display: flex;
            align-items: center;
            /* Usunięto duże przerwy, żeby wszystko było max do lewej */
        }

        .nav-logo-img {
            height: 65px;
            margin-right: 15px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            padding: 10px 15px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        /* JĘZYKI - MAX DO PRAWEJ */
        .lang-dropdown {
            position: relative;
            margin-right: 10px;
        }

        .lang-btn {
            background: white;
            border: 2px solid var(--gold);
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .lang-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: white;
            min-width: 180px;
            border: 2px solid var(--gold);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            z-index: 101;
        }

        .lang-content a {
            color: #333;
            padding: 12px 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }

        .lang-content a:hover {
            background: #fdf6e7;
            color: var(--gold);
        }

        .lang-dropdown:hover .lang-content {
            display: block;
        }

        .flag-img {
            width: 22px;
            height: 15px;
            display: block;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .main-content {
            text-align: center;
            padding: 100px 20px;
        }
    </style>
</head>
<body>

    <button class="enter-btn" onclick="enterSite()">WEJDŹ</button>

    <div id="under-construction-overlay">
        <div style="text-align: center;">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="big-logo">
            <h1 style="color: var(--gold); font-size: 3rem; margin-top: 20px;">STRONA W BUDOWIE</h1>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="nav-logo-img">
            <ul class="nav-links">
                <li><a href="#">Start</a></li>
                <li><a href="#">O Klubie</a></li>
                <li><a href="#">Drużyna</a></li>
                <li><a href="#">Kontakt</a></li>
            </ul>
        </div>

        <div class="lang-dropdown">
            <button class="lang-btn">
                <img src="https://flagcdn.com/w40/pl.png" class="flag-img"> PL ▼
            </button>
            <div class="lang-content">
                <a href="javascript:void(0)"><img src="https://flagcdn.com/w40/pl.png" class="flag-img"> Polski</a>
                <a href="javascript:void(0)"><img src="https://flagcdn.com/w40/gb.png" class="flag-img"> English</a>
                <a href="javascript:void(0)"><img src="https://flagcdn.com/w40/es.png" class="flag-img"> Español</a>
                <a href="javascript:void(0)"><img src="https://flagcdn.com/w40/ru.png" class="flag-img"> Русский</a>
                <a href="javascript:void(0)"><img src="https://flagcdn.com/w40/ua.png" class="flag-img"> Українська</a>
                <a href="javascript:void(0)"><img src="https://flagcdn.com/w40/by.png" class="flag-img"> Беларуская</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h2 style="font-size: 3.5rem; color: var(--gold);">LEGION BIAŁYSTOK</h2>
        <p style="font-size: 1.5rem; font-weight: bold;">Oficjalny serwis klubu.</p>
    </div>

    <script>
        function enterSite() {
            document.getElementById('under-construction-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.querySelector('.enter-btn').style.display = 'none';
        }
    </script>

</body>
</html>
