<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Strona Oficjalna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
            --black-bg: #0b0c10;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { 
            height: 90px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; border-bottom: 4px solid var(--gold); background: var(--white); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-logo-img { height: 70px; width: auto; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; text-transform: uppercase; font-size: 14px; }
        .nav-links a:hover { color: var(--gold); }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .social-link { color: var(--dark); font-size: 22px; text-decoration: none; display: flex; align-items: center; }
        .separator { width: 1px; height: 30px; background-color: #ccc; }

        /* JĘZYKI */
        .lang-dropdown { position: relative; }
        .lang-btn { background: white; border: 2px solid var(--gold); padding: 6px 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .lang-content { display: none; position: absolute; right: 0; background: white; min-width: 150px; border: 2px solid var(--gold); z-index: 101; }
        .lang-content a { color: #333; padding: 10px; text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .lang-dropdown:hover .lang-content { display: block; }

        /* HERO SECTION - OCZYSZCZONY */
        .hero {
            height: 60vh;
            background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* SLIDER ARTYKUŁÓW NACHODZĄCY NA ZDJĘCIE */
        .news-slider-container {
            margin-top: -150px; /* Nachodzenie na zdjęcie */
            padding-bottom: 50px;
            position: relative;
            z-index: 10;
        }

        .news-slider {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 50px;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Ukrycie scrollbara Firefox */
        }
        .news-slider::-webkit-scrollbar { display: none; } /* Ukrycie scrollbara Chrome/Safari */

        .news-card {
            min-width: 350px;
            height: 450px;
            background: var(--black-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .news-card:hover { transform: scale(1.02); }

        .news-card-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.7;
            transition: 0.5s;
        }
        .news-card:hover .news-card-img { opacity: 0.4; }

        .news-card-info {
            position: absolute;
            bottom: 0;
            padding: 30px;
            color: white;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .news-card-info h3 { 
            font-size: 1.4rem; 
            margin: 10px 0; 
            text-transform: uppercase; 
            font-style: italic;
            line-height: 1.2;
        }

        .news-card-date { color: var(--gold); font-size: 14px; font-weight: bold; }

        /* PRZYCISKI PRZESUWANIA */
        .slider-nav {
            position: absolute;
            right: 50px;
            top: -40px;
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            background: var(--gold);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img" onclick="location.href='index.html'">
            <ul class="nav-links">
                <li><a href="aktualnosci.html">Aktualności</a></li>
                <li><a href="#">Drużyna</a></li>
                <li><a href="#">Terminarz</a></li>
                <li><a href="#">Kontakt</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
            <div class="separator"></div>
            <div class="lang-dropdown">
                <button class="lang-btn">
                    <img src="https://flagcdn.com/w40/pl.png" width="20"> PL ▼
                </button>
                <div class="lang-content">
                    <a href="#">PL</a>
                    <a href="#">EN</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero"></header>

    <div class="news-slider-container">
        <div class="slider-nav">
            <button class="nav-btn" onclick="scrollSlider(-400)"><i class="fas fa-chevron-left"></i></button>
            <button class="nav-btn" onclick="scrollSlider(400)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="news-slider" id="newsSlider">
            </div>
    </div>

    <script>
        // Dane artykułów (pobierane z localStorage lub wpisane na stałe)
        let articles = JSON.parse(localStorage.getItem('legion_news')) || [
            { title: "GWIAZDA RYWALA: SEBASTIAN KERK", date: "2026-04-17 15:45", img: "https://via.placeholder.com/400x600" },
            { title: "ROMANCZUK: MUSIMY PODNIEŚĆ NASZ MENTAL", date: "2026-04-17 12:01", img: "https://via.placeholder.com/400x600" },
            { title: "SIEMIENIEC: CHCĘ WRÓCIĆ DO FUNDAMENTÓW", date: "2026-04-17 11:54", img: "https://via.placeholder.com/400x600" }
        ];

        function renderSlider() {
            const slider = document.getElementById('newsSlider');
            slider.innerHTML = '';
            
            // Sortowanie datą od najnowszych
            articles.sort((a, b) => new Date(b.date) - new Date(a.date));

            articles.forEach(art => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.onclick = () => window.location.href = 'aktualnosci.html';
                
                card.innerHTML = `
                    <div class="news-card-img" style="background-image: url('${art.img}')"></div>
                    <div class="news-card-info">
                        <div class="news-card-date">${art.date}</div>
                        <h3>${art.title}</h3>
                    </div>
                `;
                slider.appendChild(card);
            });
        }

        function scrollSlider(amount) {
            document.getElementById('newsSlider').scrollBy({ left: amount, behavior: 'smooth' });
        }

        window.onload = renderSlider;
    </script>
</body>
</html>
