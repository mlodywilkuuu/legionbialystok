<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --light-gray: #f4f4f4;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--white);
            color: #1a1a1a;
            overflow: hidden;
        }

        /* PRELOADER */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .loader-logo {
            max-width: 220px;
            animation: pulse-gold 2s infinite ease-in-out;
        }

        @keyframes pulse-gold {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.3)); }
        }

        /* NAWIGACJA */
        .navbar {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 4px solid var(--gold);
            background: var(--white);
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-logo-link {
            display: block;
            line-height: 0;
            transition: transform 0.3s ease;
        }

        .nav-logo-link:hover {
            transform: scale(1.05);
        }

        .nav-logo-img {
            height: 75px;
            width: auto;
            margin-right: 15px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            padding: 10px 15px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        /* PRAWA STRONA NAVBARA */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .social-link {
            color: #1a1a1a;
            font-size: 24px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-link:hover {
            color: var(--gold);
        }

        .separator {
            width: 1px;
            height: 30px;
            background-color: #ddd;
            margin: 0 5px;
        }

        /* JĘZYKI */
        .lang-dropdown { position: relative; }

        .lang-btn {
            background: white;
            border: 2px solid var(--gold);
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 13px;
        }

        .lang-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: white;
            min-width: 170px;
            border: 2px solid var(--gold);
            z-index: 101;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .lang-content a {
            color: #333;
            padding: 12px 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-family: sans-serif;
            font-weight: bold;
            cursor: pointer;
        }

        .lang-content a:hover { background: #fdf6e7; color: var(--gold); }
        .lang-dropdown:hover .lang-content { display: block; }

        .flag-img { width: 22px; height: 15px; object-fit: cover; }

        .main-content { text-align: center; padding: 120px 20px; }
        .fade-out { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="loader">
        <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Legion Logo" class="loader-logo">
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-logo-link">
                <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="nav-logo-img">
            </a>
            
            <ul class="nav-links">
                <li><a href="aktualnosci.html" id="link-news">Aktualności</a></li>
                <li><a href="druzyna.html" id="link-team">Drużyna</a></li>
                <li><a href="terminarz.html" id="link-schedule">Terminarz</a></li>
                <li><a href="kontakt.html" id="link-contact">Kontakt</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <a href="https://www.instagram.com/legionbialystok/" target="_blank" class="social-link">
                <i class="fab fa-instagram"></i>
            </a>

            <div class="separator"></div>

            <div class="lang-dropdown">
                <button class="lang-btn">
                    <img src="https://flagcdn.com/w40/pl.png" class="flag-img" id="current-flag"> <span id="current-lang">PL</span> ▼
                </button>
                <div class="lang-content">
                    <a onclick="changeLang('pl')"><img src="https://flagcdn.com/w40/pl.png" class="flag-img"> Polski</a>
                    <a onclick="changeLang('en')"><img src="https://flagcdn.com/w40/gb.png" class="flag-img"> English</a>
                    <a onclick="changeLang('es')"><img src="https://flagcdn.com/w40/es.png" class="flag-img"> Español</a>
                    <a onclick="changeLang('ru')"><img src="https://flagcdn.com/w40/ru.png" class="flag-img"> Русский</a>
                    <a onclick="changeLang('ua')"><img src="https://flagcdn.com/w40/ua.png" class="flag-img"> Українська</a>
                    <a onclick="changeLang('by')"><img src="https://flagcdn.com/w40/by.png" class="flag-img"> Беларуская</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h2 id="main-title" style="font-size: 3.5rem; color: var(--gold); margin: 0;">LEGION BIAŁYSTOK</h2>
        <p id="main-desc" style="font-size: 1.5rem; font-weight: bold; margin-top: 10px;">Oficjalny serwis klubu.</p>
    </div>

    <script>
        // Loader logic
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loader').classList.add('fade-out');
                document.body.style.overflow = 'auto';
            }, 1200); 
        });

        // Tłumaczenia
        const translations = {
            pl: { news: "Aktualności", team: "Drużyna", schedule: "Terminarz", contact: "Kontakt", title: "LEGION BIAŁYSTOK", desc: "Oficjalny serwis klubu." },
            en: { news: "News", team: "Team", schedule: "Schedule", contact: "Contact", title: "LEGION BIALYSTOK", desc: "Official club website." },
            es: { news: "Noticias", team: "Equipo", schedule: "Calendario", contact: "Contacto", title: "LEGION BIALYSTOK", desc: "Sitio oficial." },
            ru: { news: "Новости", team: "Команда", schedule: "Расписание", contact: "Контакты", title: "ЛЕГИОН БЕЛОСТОК", desc: "Официальный сайт." },
            ua: { news: "Новини", team: "Команда", schedule: "Розклад", contact: "Контакти", title: "ЛЕГІОН БІЛОСТОК", desc: "Офіційний сайт." },
            by: { news: "Навіны", team: "Каманда", schedule: "Расклад", contact: "Канtakty", title: "ЛЕГІЁН БЕЛАСТОК", desc: "Афіцыйны сайт." }
        };

        function changeLang(lang) {
            const t = translations[lang];
            document.getElementById('link-news').innerText = t.news;
            document.getElementById('link-team').innerText = t.team;
            document.getElementById('link-schedule').innerText = t.schedule;
            document.getElementById('link-contact').innerText = t.contact;
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('main-desc').innerText = t.desc;

            const flags = { pl: 'pl', en: 'gb', es: 'es', ru: 'ru', ua: 'ua', by: 'by' };
            document.getElementById('current-flag').src = `https://flagcdn.com/w40/${flags[lang]}.png`;
            document.getElementById('current-lang').innerText = lang.toUpperCase();
        }
    </script>

</body>
</html>
