<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Powrót</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute z-10 text-center">
            <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter mb-4">
                Legion <span class="text-red-600">Białystok</span>
            </h1>
            <p class="text-xl md:text-2xl font-light tracking-widest mb-8">WRACAMY DO GRY!</p>
            <a href="#article" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full font-bold transition duration-300">
                PRZECZYTAJ WIĘCEJ
            </a>
        </div>
        <div class="absolute inset-0 bg-black opacity-60"></div>
        <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=1920" 
             alt="Stadion" class="absolute inset-0 w-full h-full object-cover">
    </header>

    <main id="article" class="max-w-4xl mx-auto py-20 px-6">
        <article class="prose prose-invert lg:prose-xl">
            <h2 class="text-4xl font-bold mb-6 border-b-2 border-red-600 pb-2">Reaktywacja stała się faktem</h2>
            <p class="text-gray-300 leading-relaxed mb-6">
                To nie jest tylko informacja o wznowieniu treningów – to oficjalny sygnał, 
                że KS Legion Białystok wraca tam, gdzie jego miejsce.
            </p>
            </article>
    </main>

</body>
</html>
