<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Strona w budowie</title>
    <style>
        :root {
            --main-red: #cc0000; /* Dopasuj do barw Legionu */
            --accent-gold: #ffd700;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: white;
            overflow: hidden; /* Blokujemy przewijanie, póki jest plansza */
        }

        /* PLANSZA W BUDOWIE */
        #under-construction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .construction-content {
            text-align: center;
            padding: 20px;
        }

        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.1));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* PRZYCISK WEJŚCIA (LEWY GÓRNY RÓG) */
        .enter-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: var(--main-red);
            border-color: var(--main-red);
        }

        /* MENU (STYLE DYNAMO) */
        .navbar {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--main-red);
        }

        /* TREŚĆ STRONY GŁÓWNEJ */
        .main-page {
            padding: 100px 50px;
            text-align: center;
        }

        /* KLASA DO UKRYWANIA PLANSZY */
        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <button class="enter-btn" onclick="enterSite()">Wejdź do serwisu</button>

    <div id="under-construction-overlay">
        <div class="construction-content">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo Legion" class="logo">
            <h1>STRONA W BUDOWIE</h1>
            <p style="color: #666;">Pracujemy nad nowym serwisem Legionu Białystok.</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-logo" style="font-weight: bold; font-size: 1.5rem;">LEGION</div>
        <ul class="nav-links">
            <li><a href="#">Start</a></li>
            <li><a href="#">Drużyna</a></li>
            <li><a href="#">Terminarz</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>
    </nav>

    <div class="main-page">
        <h2>Witaj na oficjalnej stronie Legionu!</h2>
        <p>Tutaj wkrótce znajdą się aktualności, wyniki i statystyki.</p>
    </div>

    <script>
        function enterSite() {
            // Ukrywa planszę "w budowie"
            document.getElementById('under-construction-overlay').classList.add('hidden');
            // Przywraca przewijanie strony
            document.body.style.overflow = 'auto';
            // Zmienia tekst przycisku
            document.querySelector('.enter-btn').style.display = 'none';
        }
    </script>

</body>
</html>
</html>
