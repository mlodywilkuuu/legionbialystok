<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok</title>
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--white);
            color: #333;
            overflow: hidden;
        }

        /* PLANSZA OVERLAY */
        #under-construction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.8s ease;
        }

        .big-logo {
            max-width: 300px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .enter-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            background: var(--gold);
            border: none;
            color: white;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* NAWIGACJA */
        .navbar {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 4px solid var(--gold);
        }

        .nav-left { display: flex; align-items: center; }
        .nav-logo-img { height: 65px; margin-right: 15px; }

        .nav-links { list-style: none; display: flex; margin: 0; padding: 0; }
        .nav-links a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            padding: 10px 15px;
        }

        /* JĘZYKI */
        .lang-dropdown { position: relative; margin-right: 10px; }
        .lang-btn {
            background: white;
            border: 2px solid var(--gold);
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .lang-content {
            display: none;
            position: absolute;
            right: 0;
            background: white;
            min-width: 180px;
            border: 2px solid var(--gold);
            z-index: 101;
        }

        .lang-content a {
            color: #333;
            padding: 12px 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .lang-content a:hover { background: #fdf6e7; }
        .lang-dropdown:hover .lang-content { display: block; }

        .flag-img { width: 22px; height: 15px; object-fit: cover; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .main-content { text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>

    <button class="enter-btn" onclick="enterSite()" id="btn-enter">WEJDŹ</button>

    <div id="under-construction-overlay">
        <div style="text-align: center;">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="big-logo">
            <h1 id="const-title" style="color: var(--gold); font-size: 3rem;">STRONA W BUDOWIE</h1>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="nav-logo-img">
            <ul class="nav-links">
                <li><a href="#" id="link-start">Start</a></li>
                <li><a href="#" id="link-about">O Klubie</a></li>
                <li><a href="#" id="link-team">Drużyna</a></li>
                <li><a href="#" id="link-contact">Kontakt</a></li>
            </ul>
        </div>

        <div class="lang-dropdown">
            <button class="lang-btn">
                <img src="https://flagcdn.com/w40/pl.png" class="flag-img" id="current-flag"> <span id="current-lang">PL</span> ▼
            </button>
            <div class="lang-content">
                <a onclick="changeLang('pl')"><img src="https://flagcdn.com/w40/pl.png" class="flag-img"> Polski</a>
                <a onclick="changeLang('en')"><img src="https://flagcdn.com/w40/gb.png" class="flag-img"> English</a>
                <a onclick="changeLang('es')"><img src="https://flagcdn.com/w40/es.png" class="flag-img"> Español</a>
                <a onclick="changeLang('ru')"><img src="https://flagcdn.com/w40/ru.png" class="flag-img"> Русский</a>
                <a onclick="changeLang('ua')"><img src="https://flagcdn.com/w40/ua.png" class="flag-img"> Українська</a>
                <a onclick="changeLang('by')"><img src="https://flagcdn.com/w40/by.png" class="flag-img"> Беларуская</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h2 id="main-title" style="font-size: 3.5rem; color: var(--gold);">LEGION BIAŁYSTOK</h2>
        <p id="main-desc" style="font-size: 1.5rem; font-weight: bold;">Oficjalny serwis klubu.</p>
    </div>

    <script>
        // Baza tłumaczeń
        const translations = {
            pl: {
                enter: "WEJDŹ",
                const: "STRONA W BUDOWIE",
                start: "Start",
                about: "O Klubie",
                team: "Drużyna",
                contact: "Kontakt",
                title: "LEGION BIAŁYSTOK",
                desc: "Oficjalny serwis klubu."
            },
            en: {
                enter: "ENTER",
                const: "SITE UNDER CONSTRUCTION",
                start: "Home",
                about: "About Us",
                team: "Team",
                contact: "Contact",
                title: "LEGION BIALYSTOK",
                desc: "Official club website."
            },
            es: {
                enter: "ENTRAR",
                const: "SITIO EN CONSTRUCCIÓN",
                start: "Inicio",
                about: "Sobre el Club",
                team: "Equipo",
                contact: "Contacto",
                title: "LEGION BIALYSTOK",
                desc: "Sitio oficial del club."
            },
            ru: {
                enter: "ВОЙТИ",
                const: "САЙТ В РАЗРАБОТКЕ",
                start: "Главная",
                about: "О клубе",
                team: "Команда",
                contact: "Контакты",
                title: "ЛЕГИОН БЕЛОСТОК",
                desc: "Официальный сайт клуба."
            },
            ua: {
                enter: "УВІЙТИ",
                const: "САЙТ У РОЗРОБЦІ",
                start: "Головна",
                about: "Про клуб",
                team: "Команда",
                contact: "Контакти",
                title: "ЛЕГІОН БІЛОСТОК",
                desc: "Офіційний сайт клубу."
            },
            by: {
                enter: "УВАЙСЦІ",
                const: "САЙТ У РАСПРАЦОЎЦЫ",
                start: "Галоўная",
                about: "Пра клуб",
                team: "Каманда",
                contact: "Кантакты",
                title: "ЛЕГІЁН БЕЛАСТОК",
                desc: "Афіцыйны сайт клуба."
            }
        };

        function changeLang(lang) {
            const t = translations[lang];
            
            // Podmiana tekstów na stronie
            document.getElementById('btn-enter').innerText = t.enter;
            document.getElementById('const-title').innerText = t.const;
            document.getElementById('link-start').innerText = t.start;
            document.getElementById('link-about').innerText = t.about;
            document.getElementById('link-team').innerText = t.team;
            document.getElementById('link-contact').innerText = t.contact;
            document.getElementById('main-title').innerText = t.title;
            document.getElementById('main-desc').innerText = t.desc;

            // Aktualizacja przycisku wyboru (flaga i skrót)
            const flags = { pl: 'pl', en: 'gb', es: 'es', ru: 'ru', ua: 'ua', by: 'by' };
            document.getElementById('current-flag').src = `https://flagcdn.com/w40/${flags[lang]}.png`;
            document.getElementById('current-lang').innerText = lang.toUpperCase();
        }

        function enterSite() {
            document.getElementById('under-construction-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.getElementById('btn-enter').style.display = 'none';
        }
    </script>

</body>
</html>
