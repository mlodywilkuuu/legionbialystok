<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Strona Oficjalna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
            --black-bg: #0b0c10;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { 
            height: 90px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; border-bottom: 4px solid var(--gold); background: var(--white); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-logo-img { height: 70px; width: auto; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; text-transform: uppercase; font-size: 14px; }
        .nav-links a:hover { color: var(--gold); }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .social-link { color: var(--dark); font-size: 22px; text-decoration: none; display: flex; align-items: center; }
        .separator { width: 1px; height: 30px; background-color: #ccc; }

        /* JĘZYKI */
        .lang-dropdown { position: relative; }
        .lang-btn { background: white; border: 2px solid var(--gold); padding: 6px 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .lang-content { display: none; position: absolute; right: 0; background: white; min-width: 150px; border: 2px solid var(--gold); z-index: 101; }
        .lang-content a { color: #333; padding: 10px; text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; font-family: sans-serif; font-size: 13px; }
        .lang-content a:hover { background: #f4f4f4; }
        .lang-dropdown:hover .lang-content { display: block; }
        .flag-img { width: 20px; height: 14px; object-fit: cover; }

        /* HERO SECTION */
        .hero {
            height: 60vh;
            background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000');
            background-size: cover; background-position: center; position: relative;
        }

        /* SLIDER ARTYKUŁÓW */
        .news-slider-container { margin-top: -180px; padding-bottom: 50px; position: relative; z-index: 10; }
        .news-slider { display: flex; overflow-x: auto; gap: 20px; padding: 20px 50px; scroll-behavior: smooth; scrollbar-width: none; }
        .news-slider::-webkit-scrollbar { display: none; }

        .news-card {
            min-width: 350px; height: 480px; background: var(--black-bg); border-radius: 12px; 
            overflow: hidden; position: relative; flex-shrink: 0; cursor: pointer; transition: 0.3s;
        }
        .news-card:hover { transform: translateY(-10px); }
        .news-card-img { width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.8; transition: 0.5s; }
        .news-card-info { position: absolute; bottom: 0; padding: 30px; color: white; width: 100%; box-sizing: border-box; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }
        .news-card-info h3 { font-size: 1.5rem; margin: 10px 0; text-transform: uppercase; font-style: italic; line-height: 1.1; }
        .news-card-date { color: var(--gold); font-size: 14px; font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background-color: var(--white); margin: 5vh auto; width: 80%; max-width: 900px; max-height: 85vh; overflow-y: auto; border-radius: 15px; position: relative; }
        .modal-header-img { width: 100%; height: 400px; background-size: cover; background-position: center; }
        .modal-inner-padding { padding: 40px; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 35px; cursor: pointer; color: white; z-index: 10; }

        .slider-nav { position: absolute; right: 50px; top: -50px; display: flex; gap: 10px; }
        .nav-btn { background: var(--gold); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img" onclick="location.href='index.html'">
            <ul class="nav-links">
                <li><a href="aktualnosci.html" id="nav-news">Aktualności</a></li>
                <li><a href="#" id="nav-team">Drużyna</a></li>
                <li><a href="#" id="nav-schedule">Terminarz</a></li>
                <li><a href="#" id="nav-contact">Kontakt</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
            <div class="separator"></div>
            <div class="lang-dropdown">
                <button class="lang-btn" id="lang-main-btn">
                    <img src="https://flagcdn.com/w40/pl.png" class="flag-img" id="cur-flag"> <span id="cur-txt">PL</span> ▼
                </button>
                <div class="lang-content">
                    <a onclick="changeLang('pl')"><img src="https://flagcdn.com/w40/pl.png" class="flag-img"> Polski</a>
                    <a onclick="changeLang('en')"><img src="https://flagcdn.com/w40/gb.png" class="flag-img"> English</a>
                    <a onclick="changeLang('es')"><img src="https://flagcdn.com/w40/es.png" class="flag-img"> Español</a>
                    <a onclick="changeLang('ru')"><img src="https://flagcdn.com/w40/ru.png" class="flag-img"> Русский</a>
                    <a onclick="changeLang('fr')"><img src="https://flagcdn.com/w40/fr.png" class="flag-img"> Français</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero"></header>

    <div class="news-slider-container">
        <div class="slider-nav">
            <button class="nav-btn" onclick="scrollSlider(-400)"><i class="fas fa-chevron-left"></i></button>
            <button class="nav-btn" onclick="scrollSlider(400)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="news-slider" id="newsSlider"></div>
    </div>

    <div id="newsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const translations = {
            pl: { news: "Aktualności", team: "Drużyna", sched: "Terminarz", cont: "Kontakt" },
            en: { news: "News", team: "Team", sched: "Schedule", cont: "Contact" },
            es: { news: "Noticias", team: "Equipo", sched: "Calendario", cont: "Contacto" },
            ru: { news: "Новости", team: "Команда", sched: "Расписание", cont: "Контакт" },
            fr: { news: "Actualités", team: "Équipe", sched: "Calendrier", cont: "Contact" }
        };

        const articles = [
            { title: "GWIAZDA RYWALA: SEBASTIAN KERK", date: "2026-04-18T20:14:00", img: "https://via.placeholder.com/800x500" },
            { title: "ROMANCZUK: MUSIMY PODNIEŚĆ NASZ MENTAL", date: "2026-04-17T12:01:00", img: "https://via.placeholder.com/800x500" },
            { title: "SIEMIENIEC: CHCĘ WRÓCIĆ DO FUNDAMENTÓW", date: "2026-04-17T11:54:00", img: "https://via.placeholder.com/800x500" }
        ];

        function formatDate(dateString) {
            const d = new Date(dateString);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${day}.${month}.${year} ${hours}:${minutes}`;
        }

        function changeLang(l) {
            const t = translations[l];
            document.getElementById('nav-news').innerText = t.news;
            document.getElementById('nav-team').innerText = t.team;
            document.getElementById('nav-schedule').innerText = t.sched;
            document.getElementById('nav-contact').innerText = t.cont;

            const flags = { pl: 'pl', en: 'gb', es: 'es', ru: 'ru', fr: 'fr' };
            document.getElementById('cur-flag').src = `https://flagcdn.com/w40/${flags[l]}.png`;
            document.getElementById('cur-txt').innerText = l.toUpperCase();
        }

        function renderSlider() {
            const slider = document.getElementById('newsSlider');
            slider.innerHTML = '';
            articles.sort((a, b) => new Date(b.date) - new Date(a.date));
            articles.forEach(art => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.onclick = () => openModal(art);
                card.innerHTML = `
                    <div class="news-card-img" style="background-image: url('${art.img}')"></div>
                    <div class="news-card-info">
                        <div class="news-card-date">${formatDate(art.date)}</div>
                        <h3>${art.title}</h3>
                    </div>
                `;
                slider.appendChild(card);
            });
        }

        function openModal(art) {
            const modal = document.getElementById('newsModal');
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <div class="modal-header-img" style="background-image: url('${art.img}')"></div>
                <div class="modal-inner-padding">
                    <small style="color: var(--gold); font-weight: bold;">${formatDate(art.date)}</small>
                    <h1 style="margin: 10px 0; font-style: italic;">${art.title}</h1>
                    <p style="font-family: sans-serif; line-height: 1.8; color: #333;">Pełna treść artykułu wyświetlana w oknie modalnym...</p>
                </div>
            `;
            modal.style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            document.getElementById('newsModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        function scrollSlider(amount) { document.getElementById('newsSlider').scrollBy({ left: amount, behavior: 'smooth' }); }
        
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); };
        window.onload = renderSlider;
    </script>
</body>
</html>
