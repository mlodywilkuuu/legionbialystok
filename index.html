<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok</title>
    <style>
        :root {
            --main-red: #cc0000;
            --accent-gold: #ffd700;
            --dark-bg: #121212;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden;
        }

        /* PLANSZA OVERLAY */
        #under-construction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .construction-content { text-align: center; }
        
        .big-logo {
            max-width: 250px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.1));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* PRZYCISK WEJŚCIA */
        .enter-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 10000;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            transition: 0.3s;
        }

        .enter-btn:hover { background: var(--main-red); }

        /* NAWIGACJA */
        .navbar {
            height: 70px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Logo/Przyciski po lewej, Języki po prawej */
            padding: 0 30px;
            border-bottom: 2px solid var(--main-red);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-logo-img {
            height: 50px;
            width: auto;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--main-red); }

        /* MENU JĘZYKÓW (DROPDOWN) */
        .lang-dropdown {
            position: relative;
            display: inline-block;
        }

        .lang-btn {
            background: none;
            border: 1px solid #444;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lang-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #1a1a1a;
            min-width: 100px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            z-index: 1;
        }

        .lang-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
        }

        .lang-content a:hover { background-color: var(--main-red); }
        .lang-dropdown:hover .lang-content { display: block; }
        .lang-dropdown:hover .lang-btn { background: #333; }

        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <button class="enter-btn" onclick="enterSite()">Pomiń ekran</button>

    <div id="under-construction-overlay">
        <div class="construction-content">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="big-logo">
            <h1>STRONA W BUDOWIE</h1>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="nav-logo-img">
            
            <ul class="nav-links">
                <li><a href="#">Start</a></li>
                <li><a href="#">Drużyna</a></li>
                <li><a href="#">Mecze</a></li>
                <li><a href="#">Klub</a></li>
            </ul>
        </div>

        <div class="lang-dropdown">
            <button class="lang-btn">PL ▼</button>
            <div class="lang-content">
                <a href="#">Polski</a>
                <a href="#">English</a>
                <a href="#">Deutsch</a>
            </div>
        </div>
    </nav>

    <div style="padding: 100px; text-align: center;">
        <h2>Oficjalny serwis Legion Białystok</h2>
        <p>Treść strony głównej w przygotowaniu.</p>
    </div>

    <script>
        function enterSite() {
            document.getElementById('under-construction-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.querySelector('.enter-btn').style.display = 'none';
        }
    </script>

</body>
</html>
