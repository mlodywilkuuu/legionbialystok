<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok</title>
    <style>
        :root {
            --accent-gold: #D4AF37; /* Eleganckie złoto */
            --pure-white: #ffffff;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif, Arial;
            background-color: var(--dark-bg);
            color: var(--pure-white);
            overflow: hidden;
        }

        /* PLANSZA OVERLAY */
        #under-construction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .big-logo {
            max-width: 280px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* PRZYCISK WEJŚCIA */
        .enter-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            background: none;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 10px;
            transition: 0.4s;
        }

        .enter-btn:hover {
            background: var(--accent-gold);
            color: black;
            box-shadow: 0 0 15px var(--accent-gold);
        }

        /* NOWOCZESNA NAWIGACJA */
        .navbar {
            height: 80px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: relative;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 50px;
        }

        .nav-logo-img {
            height: 60px;
            width: auto;
            transition: 0.3s;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: var(--pure-white);
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            position: relative;
            transition: 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--accent-gold); }
        .nav-links a:hover::after { width: 100%; }

        /* JĘZYKI Z FLAGAMI */
        .lang-dropdown {
            position: relative;
        }

        .lang-btn {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 18px;
            cursor: pointer;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            transition: 0.3s;
        }

        .lang-btn:hover { border-color: var(--accent-gold); }

        .lang-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: #1a1a1a;
            min-width: 140px;
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
            margin-top: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .lang-content a {
            color: white;
            padding: 12px 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            transition: 0.2s;
        }

        .lang-content a:hover {
            background: var(--accent-gold);
            color: black;
        }

        .lang-dropdown:hover .lang-content { display: block; }

        .flag { font-size: 16px; }

        .hidden { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.1); }
    </style>
</head>
<body>

    <button class="enter-btn" onclick="enterSite()">Eksploruj</button>

    <div id="under-construction-overlay">
        <div style="text-align: center;">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="big-logo">
            <h1 style="letter-spacing: 10px; font-weight: 200; color: var(--pure-white);">LEGION</h1>
            <div style="width: 50px; height: 2px; background: var(--accent-gold); margin: 20px auto;"></div>
            <p style="color: var(--accent-gold); letter-spacing: 3px; font-size: 12px; text-transform: uppercase;">Wkrótce otwarcie</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" alt="Logo" class="nav-logo-img">
            
            <ul class="nav-links">
                <li><a href="#">Start</a></li>
                <li><a href="#">O klubie</a></li>
                <li><a href="#">Drużyna</a></li>
                <li><a href="#">Terminarz</a></li>
                <li><a href="#">Kontakt</a></li>
            </ul>
        </div>

        <div class="lang-dropdown">
            <button class="lang-btn">
                <span class="flag">🇵🇱</span> PL ▼
            </button>
            <div class="lang-content">
                <a href="#"><span class="flag">🇵🇱</span> Polski</a>
                <a href="#"><span class="flag">🇬🇧</span> English</a>
                <a href="#"><span class="flag">🇩🇪</span> Deutsch</a>
            </div>
        </div>
    </nav>

    <div style="padding: 150px 50px; text-align: center;">
        <h2 style="font-size: 3rem; font-weight: 700;">LEGION BIAŁYSTOK</h2>
        <p style="color: #888; max-width: 600px; margin: 20px auto; line-height: 1.8;">
            Witaj na nowej platformie cyfrowej klubu. Budujemy nową jakość dla naszych zawodników i kibiców.
        </p>
    </div>

    <script>
        function enterSite() {
            document.getElementById('under-construction-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.querySelector('.enter-btn').style.display = 'none';
        }
    </script>

</body>
</html>
