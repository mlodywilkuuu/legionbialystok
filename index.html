<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Oficjalna Strona</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
            --gray: #f4f4f4;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { 
            height: 90px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; border-bottom: 4px solid var(--gold); background: var(--white); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-logo-img { height: 70px; width: auto; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; text-transform: uppercase; font-size: 14px; }
        .nav-links a:hover { color: var(--gold); }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .social-link { color: var(--dark); font-size: 22px; text-decoration: none; }
        .separator { width: 1px; height: 30px; background-color: #ccc; }

        /* JĘZYKI */
        .lang-dropdown { position: relative; }
        .lang-btn { background: white; border: 2px solid var(--gold); padding: 6px 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .lang-content { display: none; position: absolute; right: 0; background: white; min-width: 160px; border: 2px solid var(--gold); z-index: 101; }
        .lang-content a { color: #333; padding: 10px; text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; font-family: sans-serif; font-size: 13px; }
        .lang-content a:hover { background: var(--gray); }
        .lang-dropdown:hover .lang-content { display: block; }
        .flag-img { width: 20px; height: 14px; object-fit: cover; }

        /* HERO - OCZYSZCZONY */
        .hero {
            height: 50vh;
            background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000');
            background-size: cover; background-position: center;
        }

        /* NOWY STYL KAFELKÓW */
        .news-section { max-width: 1400px; margin: -100px auto 50px; padding: 0 40px; position: relative; z-index: 10; }
        
        .slider-controls { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: var(--gold); color: white; border: none; padding: 12px 18px; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .nav-btn:hover { background: var(--dark); }

        .news-slider { display: flex; overflow-x: auto; gap: 25px; scroll-behavior: smooth; scrollbar-width: none; padding-bottom: 20px; }
        .news-slider::-webkit-scrollbar { display: none; }

        .article-card { 
            min-width: 380px; background: white; border-radius: 4px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; 
            border-bottom: 5px solid transparent; overflow: hidden;
        }
        .article-card:hover { transform: translateY(-10px); border-bottom-color: var(--gold); }
        
        .article-img { width: 100%; height: 250px; background-size: cover; background-position: center; }
        .article-info { padding: 25px; }
        .article-date { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 10px; display: block; }
        .article-title { font-size: 1.3rem; margin: 0; text-transform: uppercase; font-style: italic; line-height: 1.3; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5vh auto; width: 90%; max-width: 800px; border-radius: 8px; overflow: hidden; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 40px; cursor: pointer; color: white; z-index: 20; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img" onclick="location.href='index.html'">
            <ul class="nav-links">
                <li><a href="aktualnosci.html" id="l-news">Aktualności</a></li>
                <li><a href="#" id="l-team">Drużyna</a></li>
                <li><a href="#" id="l-sched">Terminarz</a></li>
                <li><a href="#" id="l-cont">Kontakt</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
            <div class="separator"></div>
            <div class="lang-dropdown">
                <button class="lang-btn">
                    <img src="https://flagcdn.com/w40/pl.png" class="flag-img" id="cur-flag"> <span id="cur-txt">PL</span> ▼
                </button>
                <div class="lang-content">
                    <a onclick="changeLang('pl')"><img src="https://flagcdn.com/w40/pl.png" class="flag-img"> Polski</a>
                    <a onclick="changeLang('en')"><img src="https://flagcdn.com/w40/gb.png" class="flag-img"> English</a>
                    <a onclick="changeLang('es')"><img src="https://flagcdn.com/w40/es.png" class="flag-img"> Español</a>
                    <a onclick="changeLang('ru')"><img src="https://flagcdn.com/w40/ru.png" class="flag-img"> Русский</a>
                    <a onclick="changeLang('fr')"><img src="https://flagcdn.com/w40/fr.png" class="flag-img"> Français</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero"></header>

    <section class="news-section">
        <div class="slider-controls">
            <button class="nav-btn" onclick="scrollNews(-400)"><i class="fas fa-arrow-left"></i></button>
            <button class="nav-btn" onclick="scrollNews(400)"><i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="news-slider" id="mainSlider"></div>
    </section>

    <div id="artModal" class="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content" id="modalBox"></div>
    </div>

    <script>
        let currentLang = 'pl';

        const translations = {
            pl: { news: "Aktualności", team: "Drużyna", sched: "Terminarz", cont: "Kontakt" },
            en: { news: "News", team: "Team", sched: "Schedule", cont: "Contact" },
            es: { news: "Noticias", team: "Equipo", sched: "Calendario", cont: "Contacto" },
            ru: { news: "Новости", team: "Команда", sched: "Расписание", cont: "Контакт" },
            fr: { news: "Actualités", team: "Équipe", sched: "Calendrier", cont: "Contact" }
        };

        const articles = [
            {
                date: "2026-04-18T20:14:00",
                img: "https://via.placeholder.com/800x500",
                pl: { title: "GWIAZDA RYWALA: SEBASTIAN KERK", content: "Treść po polsku..." },
                en: { title: "RIVAL STAR: SEBASTIAN KERK", content: "English content..." },
                es: { title: "ESTRELLA RIVAL: SEBASTIAN KERK", content: "Contenido español..." },
                ru: { title: "ЗВЕЗДА СОПЕРНИКА: СЕБАСТЬЯН КЕРК", content: "Контент на русском..." },
                fr: { title: "VEDETTE ADVERSE : SEBASTIAN KERK", content: "Contenu français..." }
            },
            {
                date: "2026-04-17T12:05:00",
                img: "https://via.placeholder.com/800x500",
                pl: { title: "PODSUMOWANIE TRENINGU", content: "Treść po polsku..." },
                en: { title: "TRAINING SUMMARY", content: "English content..." },
                es: { title: "RESUMEN DEL ENTRENAMIENTO", content: "Contenido español..." },
                ru: { title: "ИТОГИ ТРЕНИРОВКИ", content: "Контент на русском..." },
                fr: { title: "RÉSUMÉ DE L'ENTRAÎNEMENT", content: "Contenu français..." }
            }
        ];

        function formatDate(str) {
            const d = new Date(str);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const hour = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${day}.${month}.${d.getFullYear()} ${hour}:${min}`;
        }

        function changeLang(l) {
            currentLang = l;
            const t = translations[l];
            document.getElementById('l-news').innerText = t.news;
            document.getElementById('l-team').innerText = t.team;
            document.getElementById('l-sched').innerText = t.sched;
            document.getElementById('l-cont').innerText = t.cont;

            const flags = { pl: 'pl', en: 'gb', es: 'es', ru: 'ru', fr: 'fr' };
            document.getElementById('cur-flag').src = `https://flagcdn.com/w40/${flags[l]}.png`;
            document.getElementById('cur-txt').innerText = l.toUpperCase();
            
            renderArticles();
        }

        function renderArticles() {
            const slider = document.getElementById('mainSlider');
            slider.innerHTML = '';
            
            articles.sort((a, b) => new Date(b.date) - new Date(a.date));

            articles.forEach(art => {
                const data = art[currentLang];
                const card = document.createElement('div');
                card.className = 'article-card';
                card.onclick = () => openModal(art);
                card.innerHTML = `
                    <div class="article-img" style="background-image: url('${art.img}')"></div>
                    <div class="article-info">
                        <span class="article-date">${formatDate(art.date)}</span>
                        <h3 class="article-title">${data.title}</h3>
                    </div>
                `;
                slider.appendChild(card);
            });
        }

        function openModal(art) {
            const data = art[currentLang];
            const box = document.getElementById('modalBox');
            box.innerHTML = `
                <div style="width:100%; height:350px; background:url('${art.img}') center/cover"></div>
                <div style="padding:40px;">
                    <span style="color:var(--gold); font-weight:bold;">${formatDate(art.date)}</span>
                    <h1 style="margin:15px 0; font-style:italic; text-transform:uppercase;">${data.title}</h1>
                    <hr style="border:0; border-top:3px solid var(--gold); width:60px; margin-bottom:25px;">
                    <div style="font-family:sans-serif; line-height:1.8; font-size:1.1rem; color:#444;">${data.content}</div>
                </div>
            `;
            document.getElementById('artModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('artModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function scrollNews(val) { document.getElementById('mainSlider').scrollBy({ left: val, behavior: 'smooth' }); }

        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); };
        window.onload = renderArticles;
    </script>
</body>
</html>
