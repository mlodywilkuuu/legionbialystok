<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Panel Zarządzania</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
            --gray: #f4f4f4;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { 
            height: 90px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; border-bottom: 4px solid var(--gold); background: var(--white); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        
        /* UKRYTY PRZYCISK ADMINA (W LEWYM ROGU) */
        .admin-trigger {
            position: absolute; left: 0; top: 0; width: 20px; height: 20px; 
            background: transparent; z-index: 1100; cursor: pointer;
        }

        .nav-logo-img { height: 70px; width: auto; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; text-transform: uppercase; font-size: 14px; }

        /* JĘZYKI */
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .lang-dropdown { position: relative; display: inline-block; }
        .lang-btn { background: white; border: 2px solid var(--gold); padding: 8px 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .lang-content { display: none; position: absolute; right: 0; background: white; min-width: 160px; border: 2px solid var(--gold); z-index: 1001; }
        .lang-content a { color: #333; padding: 10px; text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; font-family: sans-serif; }
        .lang-content a:hover { background: var(--gray); }
        .lang-dropdown:hover .lang-content { display: block; }
        .flag-img { width: 20px; height: 14px; object-fit: cover; }

        /* HERO */
        .hero { height: 45vh; background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000') center/cover; }

        /* ARTYKUŁY */
        .news-container { max-width: 1400px; margin: -80px auto 50px; padding: 0 40px; position: relative; z-index: 10; }
        .news-slider { display: flex; overflow-x: auto; gap: 25px; scroll-behavior: smooth; scrollbar-width: none; padding: 20px 0; }
        .news-slider::-webkit-scrollbar { display: none; }
        
        .art-card { 
            min-width: 380px; background: white; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            cursor: pointer; transition: 0.3s; overflow: hidden; border-bottom: 5px solid transparent;
        }
        .art-card:hover { transform: translateY(-10px); border-bottom-color: var(--gold); }
        .art-img { width: 100%; height: 240px; background-size: cover; background-position: center; }
        .art-body { padding: 25px; }
        .art-date { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 10px; display: block; }
        .art-title { font-size: 1.3rem; margin: 0; text-transform: uppercase; font-style: italic; }

        /* TERMINARZ */
        .match-section { max-width: 1200px; margin: 50px auto; padding: 0 40px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .match-card { background: #f9f9f9; border-left: 5px solid var(--gold); padding: 20px; border-radius: 8px; }

        /* PANEL ADMINA */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: white; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .admin-box { max-width: 700px; margin: 0 auto; background: #222; padding: 30px; border-radius: 8px; border: 1px solid var(--gold); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        .admin-btn { background: var(--gold); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* MODAL NEWS */
        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-inner { background: white; margin: 5vh auto; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 8px; position: relative; color: #333; }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 40px; cursor: pointer; color: white; z-index: 4100; }
    </style>
</head>
<body>

    <div class="admin-trigger" onclick="openAdmin()"></div>

    <nav class="navbar">
        <div class="nav-left">
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img" onclick="location.href='index.html'">
            <ul class="nav-links">
                <li><a href="#" id="txt-news">Aktualności</a></li>
                <li><a href="#" id="txt-team">Drużyna</a></li>
                <li><a href="#" id="txt-sched">Terminarz</a></li>
                <li><a href="#" id="txt-contact">Kontakt</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="lang-dropdown">
                <button class="lang-btn">
                    <img src="https://flagcdn.com/w40/pl.png" class="flag-img" id="cur-flag"> <span id="cur-txt">PL</span> ▼
                </button>
                <div class="lang-content">
                    <a onclick="changeLang('pl')"><img src="https://flagcdn.com/w40/pl.png" class="flag-img"> POLSKI</a>
                    <a onclick="changeLang('en')"><img src="https://flagcdn.com/w40/gb.png" class="flag-img"> ENGLISH</a>
                    <a onclick="changeLang('es')"><img src="https://flagcdn.com/w40/es.png" class="flag-img"> ESPAÑOL</a>
                    <a onclick="changeLang('ru')"><img src="https://flagcdn.com/w40/ru.png" class="flag-img"> РУССКИЙ</a>
                    <a onclick="changeLang('fr')"><img src="https://flagcdn.com/w40/fr.png" class="flag-img"> FRANÇAIS</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero"></header>

    <div class="news-container">
        <div class="news-slider" id="newsFeed"></div>
    </div>

    <section class="match-section">
        <h2 id="txt-matches" style="text-transform: uppercase; font-style: italic; border-left: 5px solid var(--gold); padding-left: 15px;">Terminarz</h2>
        <div class="match-grid" id="matchFeed"></div>
    </section>

    <div id="adminPanel">
        <div class="admin-box">
            <h2 style="color: var(--gold); margin-top:0;">PANEL ADMINA</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="admin-btn" onclick="showTab('tab-n')">NEWSY</button>
                <button class="admin-btn" onclick="showTab('tab-m')">MECZE</button>
            </div>

            <div id="tab-n">
                <h3>Dodaj News</h3>
                <input type="text" id="in-title" placeholder="Tytuł (PL)">
                <input type="text" id="in-title-en" placeholder="Tytuł (EN)">
                <input type="datetime-local" id="in-date">
                <input type="text" id="in-img" placeholder="Link do zdjęcia">
                <textarea id="in-content" placeholder="Treść (PL)" rows="4"></textarea>
                <button class="admin-btn" onclick="addNews()">DODAJ ARTYKUŁ</button>
            </div>

            <div id="tab-m" style="display:none;">
                <h3>Dodaj Mecz</h3>
                <input type="text" id="m-opp" placeholder="Przeciwnik">
                <input type="datetime-local" id="m-date">
                <input type="text" id="m-loc" placeholder="Miejsce">
                <button class="admin-btn" onclick="addMatch()">DODAJ MECZ</button>
            </div>
            
            <button class="admin-btn" style="background:#444;" onclick="closeAdmin()">ZAMKNIJ PANEL</button>
        </div>
    </div>

    <div id="newsModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-inner" id="modalContent"></div>
    </div>

    <script>
        let currentLang = 'pl';
        
        // TŁUMACZENIA INTERFEJSU
        const ui = {
            pl: { news: "Aktualności", team: "Drużyna", sched: "Terminarz", cont: "Kontakt", matches: "Terminarz" },
            en: { news: "News", team: "Team", sched: "Schedule", cont: "Contact", matches: "Schedule" },
            es: { news: "Noticias", team: "Equipo", sched: "Calendario", cont: "Contacto", matches: "Calendario" },
            ru: { news: "Новости", team: "Команда", sched: "Расписание", cont: "Контакт", matches: "Расписание" },
            fr: { news: "Actualités", team: "Équipe", sched: "Calendrier", cont: "Contact", matches: "Calendrier" }
        };

        // BAZA DANYCH (LocalStorage)
        let db_news = JSON.parse(localStorage.getItem('legion_news')) || [
            { id: 1, date: "2026-04-18T20:14", img: "https://via.placeholder.com/800x500", 
              pl: { title: "WITAMY NA NOWEJ STRONIE", text: "To jest nasz pierwszy wpis..." },
              en: { title: "WELCOME TO THE NEW SITE", text: "This is our first post..." }
            }
        ];
        let db_matches = JSON.parse(localStorage.getItem('legion_matches')) || [
            { opponent: "FC Dinamo", date: "2026-04-25T18:00", loc: "Stadion Miejski" }
        ];

        function renderAll() {
            // Newsy
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = db_news.sort((a,b) => new Date(b.date) - new Date(a.date)).map(n => {
                const langData = n[currentLang] || n['pl'];
                return `
                    <div class="art-card" onclick="openModal(${n.id})">
                        <div class="art-img" style="background-image:url('${n.img}')"></div>
                        <div class="art-body">
                            <span class="art-date">${n.date.replace('T', ' ')}</span>
                            <h3 class="art-title">${langData.title}</h3>
                        </div>
                    </div>
                `;
            }).join('');

            // Mecze
            const mFeed = document.getElementById('matchFeed');
            mFeed.innerHTML = db_matches.sort((a,b) => new Date(a.date) - new Date(b.date)).map(m => `
                <div class="match-card">
                    <span style="color:var(--gold); font-weight:bold;">${m.date.replace('T', ' ')}</span>
                    <div style="font-style:italic; font-size:1.2rem; margin:10px 0;">LEGION vs ${m.opponent}</div>
                    <div style="font-family:sans-serif; color:#666; font-size:14px;">${m.loc}</div>
                </div>
            `).join('');

            // UI
            const t = ui[currentLang];
            document.getElementById('txt-news').innerText = t.news;
            document.getElementById('txt-team').innerText = t.team;
            document.getElementById('txt-sched').innerText = t.sched;
            document.getElementById('txt-contact').innerText = t.cont;
            document.getElementById('txt-matches').innerText = t.matches;
        }

        function changeLang(l) {
            currentLang = l;
            const flags = { pl:'pl', en:'gb', es:'es', ru:'ru', fr:'fr' };
            document.getElementById('cur-flag').src = `https://flagcdn.com/w40/${flags[l]}.png`;
            document.getElementById('cur-txt').innerText = l.toUpperCase();
            renderAll();
        }

        // ADMIN FUNCTIONS
        function openAdmin() { document.getElementById('adminPanel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        function showTab(id) { 
            document.getElementById('tab-n').style.display = id === 'tab-n' ? 'block' : 'none';
            document.getElementById('tab-m').style.display = id === 'tab-m' ? 'block' : 'none';
        }

        function addNews() {
            const n = {
                id: Date.now(),
                date: document.getElementById('in-date').value,
                img: document.getElementById('in-img').value,
                pl: { title: document.getElementById('in-title').value, text: document.getElementById('in-content').value },
                en: { title: document.getElementById('in-title-en').value, text: "Translated content..." }
            };
            db_news.push(n);
            localStorage.setItem('legion_news', JSON.stringify(db_news));
            renderAll();
            alert("Dodano!");
        }

        function addMatch() {
            const m = {
                opponent: document.getElementById('m-opp').value,
                date: document.getElementById('m-date').value,
                loc: document.getElementById('m-loc').value
            };
            db_matches.push(m);
            localStorage.setItem('legion_matches', JSON.stringify(db_matches));
            renderAll();
            alert("Mecz dodany!");
        }

        // MODAL FUNCTIONS
        function openModal(id) {
            const n = db_news.find(x => x.id === id);
            const langData = n[currentLang] || n['pl'];
            const box = document.getElementById('modalContent');
            box.innerHTML = `
                <div style="height:350px; background:url('${n.img}') center/cover"></div>
                <div style="padding:40px;">
                    <span style="color:var(--gold); font-weight:bold;">${n.date.replace('T', ' ')}</span>
                    <h1 style="margin:15px 0; font-style:italic;">${langData.title}</h1>
                    <div style="font-family:sans-serif; line-height:1.7; color:#444;">${langData.text}</div>
                </div>
            `;
            document.getElementById('newsModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }

        window.onload = renderAll;
    </script>
</body>
</html>
