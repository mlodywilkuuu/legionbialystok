<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Białystok - Strona Oficjalna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #C5A059;
            --white: #ffffff;
            --dark: #1a1a1a;
            --black-bg: #0b0c10;
        }

        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { 
            height: 90px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; border-bottom: 4px solid var(--gold); background: var(--white); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 20px; position: relative; }
        
        /* NAPRAWIONY PRZYCISK ADMINA - przed logo */
        .admin-trigger {
            width: 20px; height: 20px; background: transparent; 
            cursor: pointer; position: relative; z-index: 1001;
        }
        .admin-trigger:hover { background: rgba(197, 160, 89, 0.1); }

        .nav-logo-img { height: 70px; width: auto; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 900; text-transform: uppercase; font-size: 14px; }

        /* JĘZYKI */
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .lang-dropdown { position: relative; }
        .lang-btn { background: white; border: 2px solid var(--gold); padding: 8px 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .lang-content { display: none; position: absolute; right: 0; background: white; min-width: 150px; border: 2px solid var(--gold); z-index: 1001; }
        .lang-content a { color: #333; padding: 10px; text-decoration: none; display: flex; align-items: center; gap: 8px; cursor: pointer; font-family: sans-serif; }
        .lang-dropdown:hover .lang-content { display: block; }

        /* HERO & SLIDER */
        .hero { height: 50vh; background: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000') center/cover; position: relative; }
        
        .news-slider-wrap { margin-top: -150px; padding: 0 50px; position: relative; z-index: 10; }
        .news-slider { display: flex; overflow-x: auto; gap: 20px; scroll-behavior: smooth; scrollbar-width: none; }
        .news-slider::-webkit-scrollbar { display: none; }

        .news-card { 
            min-width: 350px; height: 450px; background: var(--black-bg); border-radius: 10px; 
            overflow: hidden; position: relative; flex-shrink: 0; cursor: pointer; transition: 0.3s;
        }
        .news-card:hover { transform: translateY(-10px); }
        .news-card-img { width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.7; }
        .news-card-info { position: absolute; bottom: 0; padding: 25px; color: white; width: 100%; box-sizing: border-box; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .news-card-title { font-size: 1.4rem; margin: 0; text-transform: uppercase; font-style: italic; }

        /* TERMINARZ */
        .matches-section { max-width: 1300px; margin: 60px auto; padding: 0 50px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .match-card { background: #f8f8f8; border-top: 4px solid var(--gold); padding: 25px; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }

        /* PANEL ADMINA */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; color: white; padding: 40px; overflow-y: auto; }
        .admin-container { max-width: 600px; margin: 0 auto; background: #222; padding: 30px; border-radius: 8px; border: 1px solid var(--gold); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #333; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-box { background: white; margin: 5vh auto; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 8px; position: relative; color: #333; }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 40px; color: white; cursor: pointer; z-index: 4100; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="admin-trigger" onclick="checkAdminPassword()"></div>
            <img src="cbaa852c-dc69-4d31-8000-26ea13757afc-removebg-preview.png" class="nav-logo-img" onclick="location.href='index.html'">
            <ul class="nav-links">
                <li><a href="#" id="ui-news">Aktualności</a></li>
                <li><a href="#" id="ui-team">Drużyna</a></li>
                <li><a href="#" id="ui-sched">Terminarz</a></li>
                <li><a href="#" id="ui-cont">Kontakt</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="lang-dropdown">
                <button class="lang-btn">
                    <img src="https://flagcdn.com/w40/pl.png" width="20" id="cur-flag"> <span id="cur-txt">PL</span>
                </button>
                <div class="lang-content">
                    <a onclick="updateLanguage('pl')"><img src="https://flagcdn.com/w40/pl.png" width="18"> POLSKI</a>
                    <a onclick="updateLanguage('en')"><img src="https://flagcdn.com/w40/gb.png" width="18"> ENGLISH</a>
                    <a onclick="updateLanguage('es')"><img src="https://flagcdn.com/w40/es.png" width="18"> ESPAÑOL</a>
                    <a onclick="updateLanguage('ru')"><img src="https://flagcdn.com/w40/ru.png" width="18"> РУССКИЙ</a>
                    <a onclick="updateLanguage('fr')"><img src="https://flagcdn.com/w40/fr.png" width="18"> FRANÇAIS</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero"></header>

    <div class="news-slider-wrap">
        <div class="news-slider" id="newsFeed"></div>
    </div>

    <section class="matches-section">
        <h2 id="ui-match-title" style="font-style: italic; text-transform: uppercase;">TERMINARZ MECZY</h2>
        <div class="match-grid" id="matchFeed"></div>
    </section>

    <div id="adminPanel">
        <div class="admin-container">
            <h2 style="color:var(--gold)">PANEL ZARZĄDZANIA</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn-gold" onclick="switchTab('n')">NEWSY</button>
                <button class="btn-gold" onclick="switchTab('m')">MECZE</button>
            </div>

            <div id="adm-n">
                <h3>Dodaj Artykuł</h3>
                <input type="text" id="in-title-pl" placeholder="Tytuł (PL)">
                <input type="text" id="in-title-en" placeholder="Tytuł (EN)">
                <input type="text" id="in-img" placeholder="Link do zdjęcia">
                <input type="datetime-local" id="in-date">
                <textarea id="in-text-pl" rows="3" placeholder="Treść (PL)"></textarea>
                <textarea id="in-text-en" rows="3" placeholder="Treść (EN)"></textarea>
                <button class="btn-gold" onclick="createNewPost()">OPUBLIKUJ</button>
            </div>

            <div id="adm-m" style="display:none;">
                <h3>Dodaj Mecz</h3>
                <input type="text" id="m-opp" placeholder="Rywal">
                <input type="datetime-local" id="m-date">
                <input type="text" id="m-place" placeholder="Miejsce">
                <button class="btn-gold" onclick="createNewMatch()">DODAJ MECZ</button>
            </div>
            
            <button onclick="document.getElementById('adminPanel').style.display='none'" class="btn-gold" style="background:#444">ZAMKNIJ</button>
        </div>
    </div>

    <div id="newsModal" class="modal">
        <span class="close-btn" onclick="document.getElementById('newsModal').style.display='none'">&times;</span>
        <div class="modal-box" id="modalContent"></div>
    </div>

    <script>
        let currentLang = 'pl';
        let posts = JSON.parse(localStorage.getItem('legion_posts')) || [];
        let matches = JSON.parse(localStorage.getItem('legion_matches')) || [];

        const uiTranslations = {
            pl: { news: "Aktualności", team: "Drużyna", sched: "Terminarz", cont: "Kontakt", mTitle: "TERMINARZ MECZY" },
            en: { news: "News", team: "Team", sched: "Schedule", cont: "Contact", mTitle: "MATCH SCHEDULE" },
            es: { news: "Noticias", team: "Equipo", sched: "Calendario", cont: "Contacto", mTitle: "CALENDARIO" },
            ru: { news: "Новости", team: "Команда", sched: "Расписание", cont: "Контакт", mTitle: "РАСПИСАНИЕ" },
            fr: { news: "Actualités", team: "Équipe", sched: "Calendrier", cont: "Contact", mTitle: "CALENDRIER" }
        };

        function refreshPage() {
            // Newsy - na zdjęciach
            const newsFeed = document.getElementById('newsFeed');
            newsFeed.innerHTML = posts.map((p, idx) => {
                const title = currentLang === 'pl' ? p.titlePl : (p.titleEn || p.titlePl);
                return `
                    <div class="news-card" onclick="openPost(${idx})">
                        <div class="news-card-img" style="background-image:url('${p.img}')"></div>
                        <div class="news-card-info">
                            <span style="color:var(--gold); font-size:12px; font-weight:bold;">${p.date.replace('T',' ')}</span>
                            <h3 class="news-card-title">${title}</h3>
                        </div>
                    </div>
                `;
            }).join('');

            // Mecze - kafelki
            const matchFeed = document.getElementById('matchFeed');
            matchFeed.innerHTML = matches.map(m => `
                <div class="match-card">
                    <span style="color:var(--gold); font-weight:bold;">${m.date.replace('T',' ')}</span>
                    <div style="font-style:italic; font-size:1.2rem; margin:10px 0;">LEGION vs ${m.opponent}</div>
                    <small style="color:#666">${m.place}</small>
                </div>
            `).join('');

            // Tłumaczenie menu
            const t = uiTranslations[currentLang];
            document.getElementById('ui-news').innerText = t.news;
            document.getElementById('ui-team').innerText = t.team;
            document.getElementById('ui-sched').innerText = t.sched;
            document.getElementById('ui-cont').innerText = t.cont;
            document.getElementById('ui-match-title').innerText = t.mTitle;
        }

        function updateLanguage(l) {
            currentLang = l;
            const flags = { pl: 'pl', en: 'gb', es: 'es', ru: 'ru', fr: 'fr' };
            document.getElementById('cur-flag').src = `https://flagcdn.com/w40/${flags[l]}.png`;
            document.getElementById('cur-txt').innerText = l.toUpperCase();
            refreshPage();
        }

        function checkAdminPassword() {
            const p = prompt("Hasło:");
            if(p === "admin123") document.getElementById('adminPanel').style.display = 'block';
        }

        function createNewPost() {
            posts.push({
                titlePl: document.getElementById('in-title-pl').value,
                titleEn: document.getElementById('in-title-en').value,
                textPl: document.getElementById('in-text-pl').value,
                textEn: document.getElementById('in-text-en').value,
                img: document.getElementById('in-img').value,
                date: document.getElementById('in-date').value
            });
            localStorage.setItem('legion_posts', JSON.stringify(posts));
            refreshPage();
            alert("Dodano!");
        }

        function createNewMatch() {
            matches.push({
                opponent: document.getElementById('m-opp').value,
                date: document.getElementById('m-date').value,
                place: document.getElementById('m-place').value
            });
            localStorage.setItem('legion_matches', JSON.stringify(matches));
            refreshPage();
            alert("Mecz dodany!");
        }

        function openPost(idx) {
            const p = posts[idx];
            const title = currentLang === 'pl' ? p.titlePl : (p.titleEn || p.titlePl);
            const text = currentLang === 'pl' ? p.textPl : (p.textEn || p.textPl);
            document.getElementById('modalContent').innerHTML = `
                <div style="height:300px; background:url('${p.img}') center/cover"></div>
                <div style="padding:30px">
                    <h1 style="font-style:italic; text-transform:uppercase;">${title}</h1>
                    <p style="line-height:1.6; font-family:sans-serif; color:#444;">${text}</p>
                </div>
            `;
            document.getElementById('newsModal').style.display = 'block';
        }

        function switchTab(t) {
            document.getElementById('adm-n').style.display = t === 'n' ? 'block' : 'none';
            document.getElementById('adm-m').style.display = t === 'm' ? 'block' : 'none';
        }

        window.onload = refreshPage;
    </script>
</body>
</html>
